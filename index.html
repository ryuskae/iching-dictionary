<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>주역 사전 · I Ching Dictionary</title>
<style>

:root {
  --paper: oklch(0.975 0.012 85);
  --paper-2: oklch(0.955 0.014 85);
  --paper-edge: oklch(0.92 0.014 80);
  --ink: oklch(0.30 0.012 60);
  --ink-soft: oklch(0.46 0.012 60);
  --ink-faint: oklch(0.62 0.010 60);
  --rule: oklch(0.86 0.012 80);
  --rule-soft: oklch(0.91 0.010 80);
  --gold: oklch(0.66 0.09 75);
  --gold-soft: oklch(0.88 0.05 80);
  --sel: oklch(0.94 0.04 80);

  --fS: "Noto Serif KR","Noto Serif TC","Songti SC",serif;
  --fE: "Cormorant Garamond","EB Garamond",Georgia,serif;
  --fU: "Inter",-apple-system,"Helvetica Neue",sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--fU);
  color: var(--ink);
  background:
    radial-gradient(1200px 800px at 80% -10%, oklch(0.99 0.018 85), transparent 60%),
    radial-gradient(900px 600px at -10% 110%, oklch(0.96 0.02 80), transparent 55%),
    var(--paper);
  font-size: 14px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
#root { height: 100%; overflow: hidden; display: flex; flex-direction: column; max-width: 1440px; margin: 0 auto; padding: 0 32px; }

/* ── header ── */
.hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 0 14px;
  border-bottom: 1px solid var(--rule);
  flex-shrink: 0;
}
.brand { display: flex; align-items: center; gap: 16px; }
.bmark {
  display: flex; flex-direction: column; gap: 4px;
  padding: 8px 10px;
  border: 1px solid var(--rule);
  border-radius: 4px;
  background: var(--paper-2);
}
.btitle {
  font-family: var(--fS);
  font-size: 22px; font-weight: 600; letter-spacing: 2px; color: var(--ink);
}
.bsub {
  font-family: var(--fU);
  font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: var(--ink-faint); margin-top: 3px;
}
.nav { display: flex; gap: 8px; align-items: center; }
.nbtn {
  font-family: var(--fU); font-size: 12px; letter-spacing: .08em; text-transform: uppercase;
  padding: 9px 16px; border-radius: 999px; border: 1px solid var(--rule);
  background: var(--paper-2); color: var(--ink-soft); cursor: pointer; transition: all .15s;
}
.nbtn:hover { border-color: var(--gold); color: var(--ink); }
.lsw { display: flex; border: 1px solid var(--rule); border-radius: 999px; overflow: hidden; background: var(--paper-2); }
.lbtn { font-family: var(--fU); font-size: 11px; font-weight: 500; padding: 7px 14px; border: none; background: transparent; color: var(--ink-soft); cursor: pointer; transition: all .15s; }
.lbtn:hover { color: var(--ink); }
.lbtn.on { background: var(--gold); color: var(--paper); }

/* ── layout ── */
.body {
  display: grid; grid-template-columns: 360px 1fr; gap: 40px;
  padding: 28px 0 12px; flex: 1; min-height: 0; }
.sidebar { height: 100%; overflow-y: auto; overflow-x: hidden; display: flex; flex-direction: column; gap: 20px; padding-bottom: 8px; scrollbar-width: thin; scrollbar-color: var(--paper-edge) transparent; }
.divider { display: flex; justify-content: space-between; align-items: center; padding: 4px 8px; border-top: 1px dashed var(--rule); border-bottom: 1px dashed var(--rule); flex-shrink: 0; }
.tbtn { background: none; border: none; font-family: var(--fU); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-soft); cursor: pointer; padding: 8px 6px; }
.tbtn:hover { color: var(--gold); }

/* ── picker ── */
.picker { flex: 1; display: flex; flex-direction: column; background: var(--paper-2); border: 1px solid var(--rule); border-radius: 6px; padding: 20px; }
.pey { font-family: var(--fU); font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: var(--gold); font-weight: 500; }
.psub { font-family: var(--fS); font-size: 13px; color: var(--ink-soft); margin-top: 4px; margin-bottom: 16px; }
.pgrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.tcard { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 12px 6px 10px; background: var(--paper); border: 1px solid var(--rule); border-radius: 4px; cursor: pointer; transition: all .15s; font-family: inherit; }
.tcard:hover { border-color: var(--gold); transform: translateY(-1px); }
.tcard.on { background: var(--sel); border-color: var(--gold); box-shadow: 0 0 0 2px oklch(0.66 0.09 75 / .18); }
.than { font-family: var(--fS); font-size: 16px; font-weight: 600; color: var(--ink); }
.tname { font-family: var(--fS); font-size: 11px; color: var(--ink-soft); margin-top: 2px; }
.ten { font-family: var(--fE); font-style: italic; font-size: 11px; color: var(--ink-faint); }

/* ── trigram / hex glyphs ── */
.tg { display: flex; flex-direction: column; align-items: center; }
.tr { display: flex; justify-content: space-between; align-items: center; }
.bar { background: var(--ink); border-radius: .5px; height: 100%; }
.bar.s { width: 100%; }
.bar.h { width: 44%; }
.hg { display: flex; flex-direction: column; align-items: center; }
.hr { display: flex; justify-content: space-between; align-items: center; position: relative; padding: 1px 0; }
.hr.act::before { content: ""; position: absolute; left: -14px; right: -14px; top: -3px; bottom: -3px; background: var(--gold-soft); border-radius: 2px; z-index: -1; }

/* ── main panel ── */
.main { height: 100%; overflow-y: auto; overflow-x: hidden; scrollbar-width: thin; scrollbar-color: var(--paper-edge) transparent; }
.detail { min-height: 100%; background: var(--paper); border: 1px solid var(--rule); border-radius: 6px; overflow: hidden; }
.empty {  flex: 1; display: flex; align-items: center; justify-content: center; background: var(--paper-2); }
.empt-in { text-align: center; max-width: 360px; padding: 40px; }
.empt-sym { font-family: var(--fS); font-size: 36px; color: var(--ink-faint); letter-spacing: 4px; margin-bottom: 24px; line-height: 1; }
.empt-t { font-family: var(--fS); font-size: 18px; color: var(--ink); margin-bottom: 8px; }
.empt-s { font-family: var(--fE); font-style: italic; color: var(--ink-faint); font-size: 14px; }

/* ── detail header ── */
.dhead {
  display: grid; grid-template-columns: 1fr auto; gap: 32px;
  padding: 40px 48px 32px; border-bottom: 1px solid var(--rule);
  background: linear-gradient(to bottom, var(--paper-2), var(--paper));
}
.dnum { font-family: var(--fE); font-style: italic; font-size: 13px; color: var(--gold); letter-spacing: .12em; }
.dhan { font-family: var(--fS); font-size: 64px; font-weight: 500; margin: 6px 0 8px; letter-spacing: 4px; color: var(--ink); line-height: 1; }
.dnames { display: flex; align-items: baseline; gap: 10px; }
.dko { font-family: var(--fS); font-size: 18px; color: var(--ink); }
.den { font-family: var(--fE); font-style: italic; font-size: 18px; color: var(--ink-soft); }
.dot { color: var(--ink-faint); }
.dright { display: flex; flex-direction: column; align-items: flex-end; gap: 14px; }
.tpair { font-family: var(--fS); font-size: 13px; color: var(--ink-soft); text-align: right; line-height: 1.7; }
.plbl { display: inline-block; width: 20px; font-family: var(--fU); font-size: 10px; letter-spacing: .1em; color: var(--gold); }
.pen { font-family: var(--fE); font-style: italic; color: var(--ink-faint); margin-left: 6px; }

/* ── detail body ── */
.dbody { padding: 40px 48px 48px; display: flex; flex-direction: column; gap: 40px; }
.seyebrow {
  font-family: var(--fU); font-size: 11px; letter-spacing: .22em; text-transform: uppercase;
  color: var(--gold); font-weight: 500; margin-bottom: 18px;
  display: flex; align-items: center; gap: 12px;
}
.seyebrow::after { content: ""; flex: 1; height: 1px; background: var(--rule-soft); }

/* ── passage ── */
.passage { display: flex; flex-direction: column; gap: 14px; max-width: 720px; }
.phan { font-family: var(--fS); font-size: 22px; line-height: 1.7; color: var(--ink); letter-spacing: 1px; padding-left: 16px; border-left: 2px solid var(--gold); }
.pen2 { font-family: var(--fE); font-size: 19px; line-height: 1.55; color: var(--ink-soft); font-style: italic; }
.pko { font-family: var(--fS); font-size: 15.5px; line-height: 1.75; color: var(--ink); }

/* ── line rail ── */
.lrail { background: var(--paper-2); border: 1px solid var(--rule); border-radius: 6px; padding: 20px 24px; }
.lhead { display: flex; align-items: baseline; gap: 0; margin-bottom: 14px; }
.ley { font-family: var(--fU); font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: var(--gold); font-weight: 500; }
.lhint { font-family: var(--fE); font-style: italic; font-size: 12px; color: var(--ink-faint); font-weight: 400; letter-spacing: 0; text-transform: none; }
.lhead2 { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.backbtn { font-family: var(--fU); font-size: 11px; letter-spacing: .1em; color: var(--gold); background: none; border: 1px solid var(--gold-soft); border-radius: 999px; padding: 5px 14px; cursor: pointer; transition: all .15s; flex-shrink: 0; }
.backbtn:hover { background: var(--gold-soft); color: var(--ink); }
.llist { display: flex; flex-direction: column; gap: 2px; }
.li {
  display: grid; grid-template-columns: 32px 28px 56px 1fr; align-items: center; gap: 14px;
  padding: 10px 8px; background: transparent; border: none;
  border-bottom: 1px solid var(--rule-soft); cursor: pointer; text-align: left;
  font-family: inherit; transition: background .12s; width: 100%;
}
.li:last-child { border-bottom: none; }
.li:hover { background: var(--paper); }
.lnum { font-family: var(--fS); font-size: 14px; color: var(--ink-soft); text-align: center; }
.lstroke { display: flex; align-items: center; }
.stk { display: block; height: 4px; background: var(--ink); border-radius: 1px; }
.stk.s { width: 28px; }
.stk.b { width: 28px; background: linear-gradient(to right, var(--ink) 0 12px, transparent 12px 16px, var(--ink) 16px 28px); }
.llbl { font-family: var(--fU); font-size: 11px; letter-spacing: .1em; color: var(--ink-faint); text-transform: uppercase; }
.lprev { font-family: var(--fS); font-size: 13px; color: var(--ink-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── footer ── */
.ftr { display: flex; justify-content: space-between; padding: 20px 0 24px; border-top: 1px solid var(--rule); font-family: var(--fE); font-style: italic; font-size: 12.5px; color: var(--ink-soft); flex-shrink: 0; }
.ftr .m { color: var(--ink-faint); }

/* ── search overlay ── */
.sov { position: fixed; inset: 0; background: oklch(0.20 0.008 60 / .45); z-index: 100; display: flex; align-items: flex-start; justify-content: center; padding-top: 60px; backdrop-filter: blur(3px); }
.spanel { width: min(680px, 92vw); background: var(--paper); border: 1px solid var(--rule); border-radius: 10px; overflow: hidden; box-shadow: 0 24px 64px oklch(0.20 0.008 60 / .22); max-height: 80vh; display: flex; flex-direction: column; }
.shead { display: flex; align-items: center; gap: 12px; padding: 16px 20px; border-bottom: 1px solid var(--rule); flex-shrink: 0; }
.sinwrap { flex: 1; display: flex; align-items: center; gap: 10px; background: var(--paper-2); border: 1px solid var(--rule); border-radius: 6px; padding: 0 14px; }
.sico { color: var(--gold); font-size: 16px; }
.sin { flex: 1; font-family: var(--fS); font-size: 15px; color: var(--ink); background: transparent; border: none; outline: none; padding: 11px 0; }
.sin::placeholder { color: var(--ink-faint); }
.sclr { background: none; border: none; color: var(--ink-faint); cursor: pointer; font-size: 13px; padding: 4px; }
.sclsbtn { font-family: var(--fU); font-size: 11px; letter-spacing: .1em; text-transform: uppercase; padding: 8px 14px; border: 1px solid var(--rule); border-radius: 999px; background: var(--paper-2); color: var(--ink-soft); cursor: pointer; white-space: nowrap; }
.sclsbtn:hover { border-color: var(--gold); color: var(--ink); }
.sres { overflow-y: auto; flex: 1; }
.sempty { padding: 48px 24px; text-align: center; font-family: var(--fE); font-style: italic; color: var(--ink-faint); font-size: 14px; }
.sitem { width: 100%; text-align: left; background: none; border: none; border-bottom: 1px solid var(--rule-soft); padding: 14px 20px; cursor: pointer; font-family: inherit; transition: background .1s; }
.sitem:hover { background: var(--paper-2); }
.sitem:last-child { border-bottom: none; }
.smeta { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
.snum { font-family: var(--fE); font-style: italic; font-size: 11px; color: var(--gold); }
.shan2 { font-family: var(--fS); font-size: 16px; font-weight: 600; color: var(--ink); }
.sko { font-family: var(--fS); font-size: 12px; color: var(--ink-soft); }
.stag { font-family: var(--fU); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--gold); background: var(--gold-soft); padding: 2px 7px; border-radius: 999px; margin-left: 4px; }
.ssnip { font-family: var(--fS); font-size: 12.5px; color: var(--ink-soft); line-height: 1.55; }

/* ── scrollbar ── */
::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--paper-edge); border-radius: 10px; }


/* ── responsive / viewport-fit ── */

/* 큰 화면: 넉넉한 레이아웃 유지 */
@media (min-width: 1200px) {
  .dhead { padding: 36px 48px 28px; }
  .dbody { padding: 32px 48px 40px; }
}

/* 태블릿 landscape (768px~1199px 너비 AND 최대 900px 높이) — 스크롤 없이 화면에 딱 맞춤 */
@media (min-width: 768px) and (max-height: 900px) {
  #root { padding: 0 20px; }
  .hdr { padding: 10px 0 9px; }
  .bmark { padding: 5px 7px; gap: 3px; }
  .btitle { font-size: 18px; }
  .nbtn { padding: 6px 12px; font-size: 11px; }
  .lbtn { padding: 5px 11px; }

  .body { gap: 20px; padding: 12px 0 8px; grid-template-columns: 300px 1fr; }

  /* 피커 소형화 */
  .picker { flex: 1; display: flex; flex-direction: column; padding: 12px 12px 10px; }
  .psub { font-size: 11px; margin-top: 2px; margin-bottom: 10px; }
  .pgrid { gap: 5px; }
  .tcard { padding: 6px 3px 5px; gap: 4px; }
  .than { font-size: 13px; }
  .tname { font-size: 9px; margin-top: 1px; }
  .ten { font-size: 9px; }
  /* 팔괘 글리프 축소 */
  .tcard .tg { transform: scale(0.72); transform-origin: top center; margin-bottom: -8px; }
  .divider { padding: 1px 4px; }
  .tbtn { padding: 5px 4px; font-size: 10px; }

  /* 괘 상세 소형화 */
  .dhead { padding: 16px 24px 14px; gap: 20px; }
  .dnum { font-size: 11px; }
  .dhan { font-size: 40px; margin: 3px 0 5px; letter-spacing: 3px; }
  .dko, .den { font-size: 14px; }
  .dright { gap: 10px; }
  .tpair { font-size: 11px; line-height: 1.6; }
  .dbody { padding: 16px 24px 20px; gap: 18px; }
  .seyebrow { font-size: 10px; margin-bottom: 12px; }

  /* 본문 텍스트 소형화 */
  .passage { gap: 9px; }
  .phan { font-size: 17px; line-height: 1.65; padding-left: 12px; }
  .pen2 { font-size: 15px; }
  .pko { font-size: 13px; }

  /* 효 목록 소형화 */
  .lrail { padding: 14px 16px; }
  .lhead { margin-bottom: 10px; }
  .ley { font-size: 10px; }
  .lhint { font-size: 11px; }
  .llist { gap: 0; }
  .li { padding: 7px 5px; gap: 10px; grid-template-columns: 26px 26px 44px 1fr; }
  .lnum { font-size: 12px; }
  .llbl { font-size: 10px; }
  .lprev { font-size: 12px; }
  .lhead2 { margin-bottom: 12px; }
  .backbtn { font-size: 10px; padding: 4px 11px; }

  .ftr { padding: 8px 0 10px; font-size: 11px; }
}

/* 1100px 이하 (태블릿 portrait 포함) */
@media (max-width: 1100px) and (min-height: 901px) {
  #root { padding: 0 20px; }
  .body { grid-template-columns: 320px 1fr; gap: 28px; }
  .dhead { padding: 28px 32px; grid-template-columns: 1fr; }
  .dright { align-items: flex-start; }
  .tpair { text-align: left; }
  .dbody { padding: 24px 32px 32px; }
  .dhan { font-size: 48px; }
}


/* 모바일: 피커 flex:1 해제 */
@media (max-width: 767px) {
  .picker { flex: none; }
  .detail { min-height: 0; }
}

/* 모바일 / portrait */
@media (max-width: 767px) {
  html, body { overflow: auto; height: auto; }
  #root { overflow: auto; height: auto; padding: 0 16px; }
  .body { grid-template-columns: 1fr; height: auto; overflow: visible; padding: 12px 0; }
  .sidebar, .main { height: auto; overflow: visible; }
  .dhead { grid-template-columns: 1fr; padding: 20px; }
  .dright { align-items: flex-start; }
  .tpair { text-align: left; }
  .dbody { padding: 20px; }
  .dhan { font-size: 36px; }
}


/* ── 뷰포트 반응형 크기 (폰트·여백 모두 높이에 비례) ── */
.than  { font-size: clamp(13px, 1.9dvh, 22px); }
.tname { font-size: clamp(9px,  1.25dvh, 15px); margin-top: clamp(1px, 0.3dvh, 4px); }
.ten   { font-size: clamp(9px,  1.1dvh,  13px); }

.dnum  { font-size: clamp(11px, 1.4dvh, 16px); }
.dhan  { font-size: clamp(36px, 7dvh,   96px); margin: clamp(3px,0.7dvh,10px) 0 clamp(4px,0.8dvh,12px); }
.dko   { font-size: clamp(14px, 2.2dvh, 24px); }
.den   { font-size: clamp(14px, 2.2dvh, 24px); }
.tpair { font-size: clamp(11px, 1.5dvh, 16px); }

.phan  { font-size: clamp(15px, 2.6dvh, 30px); line-height: 1.7; padding-left: clamp(10px,1.2dvh,18px); }
.pen2  { font-size: clamp(13px, 2.2dvh, 24px); }
.pko   { font-size: clamp(12px, 1.9dvh, 20px); }

.seyebrow { font-size: clamp(10px, 1.3dvh, 14px); margin-bottom: clamp(10px, 1.5dvh, 20px); }
.lnum  { font-size: clamp(12px, 1.6dvh, 16px); }
.llbl  { font-size: clamp(9px,  1.1dvh, 12px); }
.lprev { font-size: clamp(11px, 1.5dvh, 15px); }
.li    { padding: clamp(5px, 0.9dvh, 12px) 8px; gap: clamp(8px, 1.2dvh, 16px); }

.dhead { padding: clamp(14px,2.5dvh,44px) clamp(18px,3dvh,52px) clamp(12px,2dvh,34px); }
.dbody { padding: clamp(14px,2.5dvh,44px) clamp(18px,3dvh,52px) clamp(16px,2.5dvh,50px); gap: clamp(16px,2.8dvh,44px); }
.passage { gap: clamp(8px, 1.2dvh, 16px); }
.lrail { padding: clamp(12px,1.8dvh,22px) clamp(14px,2dvh,26px); }
.lhead { margin-bottom: clamp(8px,1.2dvh,16px); }

.picker { padding: clamp(12px,1.8dvh,22px); }
.psub   { font-size: clamp(11px,1.4dvh,14px); margin-top: clamp(2px,0.4dvh,5px); margin-bottom: clamp(8px,1.4dvh,18px); }
.pgrid  { gap: clamp(5px, 0.8dvh, 10px); flex: 1; grid-template-rows: repeat(2, 1fr); }
.tcard  { height: 100%; justify-content: center; padding: clamp(6px,1dvh,14px) 5px; gap: clamp(4px,0.7dvh,10px); }


/* ── overflow 방어 ── */
.pgrid  { overflow: hidden; min-width: 0; }
.tcard  { min-width: 0; overflow: hidden; }
.picker { overflow: hidden; }

/* 괘효사 패널 */
.main   { overflow-x: hidden; }
.detail { overflow-x: hidden; }
.dhead  { overflow: hidden; }
.dright { overflow: hidden; flex-shrink: 0; max-width: 45%; }
.dbody  { overflow-x: hidden; }
.passage { overflow-wrap: break-word; word-break: break-word; }
.phan, .pen2, .pko { overflow-wrap: break-word; }
.lrail  { overflow: hidden; }
.lprev  { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }


/* ── 효/괘 그림 라인 (gradient 방식 - 안정적 렌더링) ── */
.tr, .hr {
  border-radius: 1px;
}
.tr.yang, .hr.yang {
  background: var(--ink);
  border-radius: 1px;
}
.tr.yin, .hr.yin {
  background: linear-gradient(
    to right,
    var(--ink) 0% 43%,
    transparent 43% 57%,
    var(--ink) 57% 100%
  );
}
/* 기존 .bar 관련 규칙은 브랜드마크용으로만 남김 */

</style>

<div id="root"></div>
<script>window.__D__ = {"1-1": {"number": 1, "name": {"han": "乾", "ko": "중천건", "en": "The Creative"}, "judgment": {"han": "乾。元亨利貞。", "en": "THE CREATIVE works sublime success, furthering through perseverance.", "ko": "건은 크게 형통하니 바름을 굳게 지킴이 이롭다."}, "lines": [{"han": "초구(初九)：潛龍勿用。", "en": "Hidden dragon. Do not act.", "ko": "잠긴 용이니 쓰지 말라."}, {"han": "구이(九二)：見龍在田，利見大人。", "en": "Dragon appearing in the field. It furthers one to see the great man.", "ko": "나타난 용이 밭에 있으니 대인을 만나봄이 이롭다."}, {"han": "구삼(九三)：君子終日乾乾，夕惕若厲，無咎。", "en": "All day long the superior man is creatively active. At nightfall his mind is still beset with cares. Danger. No blame.", "ko": "군자가 종일 힘쓰고 저녁에도 두려워하면 위태로우나 허물이 없다."}, {"han": "구사(九四)：或躍在淵，無咎。", "en": "Wavering flight over the depths. No blame.", "ko": "혹 뛰어 연못에 있으니 허물이 없다."}, {"han": "구오(九五)：飛龍在天，利見大人。", "en": "Flying dragon in the heavens. It furthers one to see the great man.", "ko": "나는 용이 하늘에 있으니 대인을 만나봄이 이롭다."}, {"han": "상구(上九)：亢龍有悔。", "en": "Arrogant dragon will have cause to repent.", "ko": "항진한 용이니 후회가 있으리라."}]}, "1-2": {"number": 10, "name": {"han": "履", "ko": "천택리", "en": "Treading"}, "judgment": {"han": "履虎尾，不咥人，亨。", "en": "TREADING. Treading upon the tail of the tiger. It does not bite the man. Success.", "ko": "호랑이 꼬리를 밟아도 사람을 물지 않으니 형통하다."}, "lines": [{"han": "초구(初九)：素履，往無咎。", "en": "Plain conduct. Progress without blame.", "ko": "소박하게 행동하니 나아가도 허물이 없다."}, {"han": "구이(九二)：履道坦坦，幽人貞吉。", "en": "Treading a smooth, level course. The perseverance of a dark man brings good fortune.", "ko": "평탄하고 넓은 길을 밟으니 은둔한 사람의 바름이 길하다."}, {"han": "육삼(六三)：眇能視，跛能履，履虎尾，咥人，凶。武人為于大君。", "en": "A one-eyed man is able to see, a lame man is able to tread. He treads on the tail of the tiger. The tiger bites the man. Misfortune. Thus does a warrior act on behalf of his great prince.", "ko": "애꾸눈도 볼 수 있고 절름발이도 밟을 수 있으나 호랑이 꼬리를 밟으니 사람을 무니 흉하다. 무인이 대군을 위해 행함이다."}, {"han": "구사(九四)：履虎尾，愬愬，終吉。", "en": "He treads on the tail of the tiger. Caution and circumspection lead ultimately to good fortune.", "ko": "호랑이 꼬리를 밟되 두려워하고 삼가면 마침내 길하다."}, {"han": "구오(九五)：夬履，貞厲。", "en": "Resolute conduct. Perseverance with awareness of danger.", "ko": "결단하여 행동하니 바름을 지키되 위태로움을 알아야 한다."}, {"han": "상구(上九)：視履考祥，其旋元吉。", "en": "Look to your conduct and weigh the favorable signs. When everything is fulfilled, supreme good fortune comes.", "ko": "밟은 것을 살펴 길흉을 헤아리니 그 돌아오는 것이 크게 길하다."}]}, "1-3": {"number": 13, "name": {"han": "同人", "ko": "천화동인", "en": "Fellowship with Men"}, "judgment": {"han": "同人于野，亨。利涉大川，利君子貞。", "en": "FELLOWSHIP WITH MEN in the open. Success. It furthers one to cross the great water. The perseverance of the superior man furthers.", "ko": "동인이 들에서 하니 형통하다. 큰 강을 건넘이 이롭고 군자의 바름이 이롭다."}, "lines": [{"han": "초구(初九)：同人于門，無咎。", "en": "Fellowship with men at the gate. No blame.", "ko": "문에서 사람들과 함께하니 허물이 없다."}, {"han": "육이(六二)：同人于宗，吝。", "en": "Fellowship with men in the clan. Humiliation.", "ko": "종족 안에서만 사람들과 함께하니 인색하다."}, {"han": "구삼(九三)：伏戎于莽，升其高陵，三歲不興。", "en": "He hides weapons in the thicket; he climbs the high hill in front of it. For three years he does not rise up.", "ko": "무기를 수풀에 숨기고 그 높은 언덕에 오르나 삼 년이 지나도록 일어나지 못한다."}, {"han": "구사(九四)：乘其墉，弗克攻，吉。", "en": "He climbs up on his wall; he cannot attack. Good fortune.", "ko": "담장에 올라가나 공격하지 못하니 길하다."}, {"han": "구오(九五)：同人，先號咷而後笑，大師克相遇。", "en": "Men bound in fellowship first weep and lament, but afterward they laugh. After great struggles they succeed in meeting.", "ko": "동인이 먼저 울부짖다가 나중에 웃으니 대군이 이겨서 서로 만난다."}, {"han": "상구(上九)：同人于郊，無悔。", "en": "Fellowship with men in the meadow. No remorse.", "ko": "교외에서 사람들과 함께하니 후회가 없다."}]}, "1-4": {"number": 25, "name": {"han": "無妄", "ko": "천뢰무망", "en": "Innocence"}, "judgment": {"han": "無妄。元亨利貞。其匪正，有眚，不利有攸往。", "en": "INNOCENCE. Supreme success. Perseverance furthers. If someone is not as he should be, he has misfortune, and it does not further him to undertake anything.", "ko": "무망은 크게 형통하고 바름이 이롭다. 바르지 않으면 재앙이 있어 나아갈 바가 있음이 이롭지 않다."}, "lines": [{"han": "초구(初九)：無妄，往吉。", "en": "Innocent behavior brings good fortune.", "ko": "망령됨이 없으니 나아가면 길하다."}, {"han": "육이(六二)：不耕穫，不菑畬，則利有攸往。", "en": "If one does not count on the harvest while plowing, nor on the use of the ground while clearing it, it furthers one to undertake something.", "ko": "밭 갈면서 수확을 바라지 않고 개간하면서 이용을 바라지 않으면 나아갈 바가 있음이 이롭다."}, {"han": "육삼(六三)：無妄之災，或繫之牛，行人之得，邑人之災。", "en": "Undeserved misfortune. The cow that was tethered by someone is the wanderer's gain, the citizen's loss.", "ko": "망령되지 않은 재앙이니 혹 매어둔 소를 나그네가 얻고 고을 사람은 재앙을 당한다."}, {"han": "구사(九四)：可貞，無咎。", "en": "He who can be persevering remains without blame.", "ko": "바름을 지킬 수 있으면 허물이 없다."}, {"han": "구오(九五)：無妄之疾，勿藥有喜。", "en": "Use no medicine in an illness incurred through no fault of your own. It will pass of itself.", "ko": "망령되지 않은 병이니 약을 쓰지 않아도 기쁨이 있다."}, {"han": "상구(上九)：無妄，行有眚，無攸利。", "en": "To act brings misfortune. Nothing furthers.", "ko": "망령됨이 없으나 행동하면 재앙이 있어 이로울 바가 없다."}]}, "1-5": {"number": 44, "name": {"han": "姤", "ko": "천풍구", "en": "Coming to Meet"}, "judgment": {"han": "姤。女壯，勿用取女。", "en": "COMING TO MEET. The maiden is powerful. One should not marry such a maiden.", "ko": "구는 여자가 강하니 그런 여자를 취해서는 안 된다."}, "lines": [{"han": "초육(初六)：繫于金柅，貞吉，有攸往，見凶，羸豕孚蹢躅。", "en": "It must be checked with a brake of bronze. Perseverance brings good fortune. If one lets it take its course, one experiences misfortune. Even a lean pig has it in him to rage around.", "ko": "금으로 된 제동장치에 매어두니 바름이 길하다. 나아갈 바가 있으면 흉함을 본다. 야윈 돼지도 이리저리 뛰어다닌다."}, {"han": "구이(九二)：包有魚，無咎，不利賓。", "en": "There is a fish in the tank. No blame. Does not further guests.", "ko": "주머니에 물고기가 있으니 허물이 없으나 손님에게는 이롭지 않다."}, {"han": "구삼(九三)：臀無膚，其行次且，厲，無大咎。", "en": "There is no skin on his thighs, and walking comes hard. If one is mindful of the danger, no great mistake is made.", "ko": "엉덩이에 살갗이 없어 걷기가 힘드니 위태로우나 큰 허물은 없다."}, {"han": "구사(九四)：包無魚，起凶。", "en": "No fish in the tank. This leads to misfortune.", "ko": "주머니에 물고기가 없으니 흉함이 일어난다."}, {"han": "구오(九五)：以杞包瓜，含章，有隕自天。", "en": "A melon covered with willow leaves. Hidden lines. Then it drops down to one from heaven.", "ko": "버드나무 잎으로 오이를 감싸니 문채를 머금고 하늘에서 떨어짐이 있다."}, {"han": "상구(上九)：姤其角，吝，無咎。", "en": "He comes to meet with his horns. Humiliation. No blame.", "ko": "뿔로 만나니 인색하나 허물이 없다."}]}, "1-6": {"number": 6, "name": {"han": "訟", "ko": "천수송", "en": "Conflict"}, "judgment": {"han": "訟。有孚，窒，惕中吉，終凶。利見大人，不利涉大川。", "en": "CONFLICT. You are sincere and are being obstructed. A cautious halt halfway brings good fortune. Going through to the end brings misfortune. It furthers one to see the great man. It does not further one to cross the great water.", "ko": "송은 믿음이 있으나 막히니, 두려워하며 중도에 멈추면 길하고 끝까지 가면 흉하다. 대인을 만나봄이 이롭고, 큰 강을 건넘은 이롭지 않다."}, "lines": [{"han": "초육(初六)：不永所事，小有言，終吉。", "en": "If one does not perpetuate the affair, there is a little gossip. In the end, good fortune comes.", "ko": "일을 오래 끌지 않으면 약간의 말이 있으나 마침내 길하다."}, {"han": "구이(九二)：不克訟，歸而逋，其邑人三百戶，無眚。", "en": "One cannot engage in conflict; one returns home, gives way. The people of his town, three hundred households, remain free of guilt.", "ko": "소송에서 이기지 못하고 돌아와 달아나니 그 고을 삼백 호의 사람이 재앙이 없다."}, {"han": "육삼(六三)：食舊德，貞厲，終吉，或從王事，無成。", "en": "To nourish oneself on ancient virtue induces perseverance. Danger. In the end, good fortune. If by chance you are in the service of a king, seek not works.", "ko": "옛 덕으로 먹고 살며 바름을 지키면 위태로우나 마침내 길하니, 혹 왕의 일에 종사하면 이룸이 없으리라."}, {"han": "구사(九四)：不克訟，復即命，渝，安貞吉。", "en": "One cannot engage in conflict. One turns back and submits to fate, changes one's attitude, and finds peace in perseverance. Good fortune.", "ko": "소송에서 이기지 못하고 돌아와 명에 따르며 바꾸어 편안히 바름을 지키면 길하다."}, {"han": "구오(九五)：訟，元吉。", "en": "To contend before him brings supreme good fortune.", "ko": "소송함에 크게 길하다."}, {"han": "상구(上九)：或錫之鞶帶，終朝三褫之。", "en": "Even if by chance a leather belt is bestowed on one, by the end of a morning it will have been snatched away three times.", "ko": "혹 가죽 띠를 받더라도 하루아침에 세 번 빼앗기리라."}]}, "1-7": {"number": 33, "name": {"han": "遯", "ko": "천산둔", "en": "Retreat"}, "judgment": {"han": "遯。亨，小利貞。", "en": "RETREAT. Success. In what is small, perseverance furthers.", "ko": "둔은 형통하니 작은 일에 바름이 이롭다."}, "lines": [{"han": "초육(初六)：遯尾，厲，勿用有攸往。", "en": "Retreat! At the tail. This is dangerous. One must not undertake anything.", "ko": "물러남의 꼬리니 위태롭고 나아갈 바가 있음이 이롭지 않다."}, {"han": "육이(六二)：執之用黃牛之革，莫之勝說。", "en": "He holds him fast with yellow cowhide. No one can tear him loose.", "ko": "황소 가죽으로 단단히 잡으니 아무도 풀지 못한다."}, {"han": "구삼(九三)：係遯，有疾厲，畜臣妾吉。", "en": "A halted retreat is nerve-wracking and dangerous. To retain people as men- and maidservants brings good fortune.", "ko": "물러남에 매임이 있어 병과 위태로움이 있으나 신하와 첩을 기름이 길하다."}, {"han": "구사(九四)：好遯，君子吉，小人否。", "en": "Voluntary retreat brings good fortune to the superior man and downfall to the inferior man.", "ko": "좋아서 물러나니 군자는 길하고 소인은 그렇지 않다."}, {"han": "구오(九五)：嘉遯，貞吉。", "en": "Friendly retreat. Perseverance brings good fortune.", "ko": "아름답게 물러나니 바름이 길하다."}, {"han": "상구(上九)：肥遯，無不利。", "en": "Cheerful retreat. Nothing that does not further.", "ko": "여유롭게 물러나니 이롭지 않음이 없다."}]}, "1-8": {"number": 12, "name": {"han": "否", "ko": "천지비", "en": "Standstill"}, "judgment": {"han": "否之匪人，不利君子貞，大往小來。", "en": "STANDSTILL. Evil people do not further the perseverance of the superior man. The great departs; the small approaches.", "ko": "비는 사람답지 못한 것이니 군자의 바름이 이롭지 않다. 큰 것이 가고 작은 것이 온다."}, "lines": [{"han": "초육(初六)：拔茅茹，以其彙，貞吉，亨。", "en": "When ribbon grass is pulled up, the sod comes with it. Each according to his kind. Perseverance brings good fortune and success.", "ko": "띠풀을 뽑으면 그 무리가 함께 나오니 바름이 길하고 형통하다."}, {"han": "육이(六二)：包承，小人吉，大人否，亨。", "en": "They bear and endure; this means good fortune for inferior people. The standstill serves to help the great man to attain success.", "ko": "포용하고 받드니 소인은 길하고 대인은 비색하나 형통하다."}, {"han": "육삼(六三)：包羞。", "en": "They bear shame.", "ko": "부끄러움을 머금도다."}, {"han": "구사(九四)：有命，無咎，疇離祉。", "en": "He who acts at the command of the highest remains without blame. Those of like mind partake of the blessing.", "ko": "명이 있으면 허물이 없으니 무리가 복을 함께 누린다."}, {"han": "구오(九五)：休否，大人吉。其亡其亡，繫于苞桑。", "en": "Standstill gives way. Good fortune for the great man. What if it should fail, what if it should fail? In this way he ties it to a cluster of mulberry shoots.", "ko": "비색함이 그치니 대인이 길하다. 망할까 망할까 하는 마음으로 뽕나무 덤불에 매어두는 듯이 한다."}, {"han": "상구(上九)：傾否，先否後喜。", "en": "The standstill comes to an end. First standstill, then good fortune.", "ko": "비색함이 기울어지니 먼저는 비색하고 나중에는 기쁨이 있도다."}]}, "2-1": {"number": 43, "name": {"han": "夬", "ko": "택천쾌", "en": "Breakthrough"}, "judgment": {"han": "夬。揚于王庭，孚號有厲，告自邑，不利即戎，利有攸往。", "en": "BREAKTHROUGH. One must resolutely make the matter known at the court of the king. It must be announced truthfully. Danger. It is necessary to notify one's own city. It does not further to resort to arms. It furthers one to undertake something.", "ko": "쾌는 왕의 조정에 드높이니 믿음으로 호령함에 위태로움이 있다. 자기 고을에 알리고 군대를 쓰는 것은 이롭지 않으며 나아갈 바가 있음이 이롭다."}, "lines": [{"han": "초구(初九)：壯于前趾，往不勝，為咎。", "en": "Mighty in the forward-striding toes. When one goes and is not equal to the task, one makes a mistake.", "ko": "앞 발가락에 힘이 있으나 나아가도 이기지 못하면 허물이 된다."}, {"han": "구이(九二)：惕號，莫夜有戎，勿恤。", "en": "A cry of alarm. Arms at evening and at night. Fear nothing.", "ko": "경계하여 호령하니 저녁과 밤에 군대가 있어도 두려워하지 말라."}, {"han": "구삼(九三)：壯于頄，有凶。君子夬夬，獨行遇雨，若濡有慍，無咎。", "en": "Being powerful in the cheekbones brings misfortune. The superior man is firmly resolved. He walks alone and is caught in the rain. He is bespattered, and people murmur against him. No blame.", "ko": "광대뼈에 힘이 있으니 흉함이 있다. 군자가 굳게 결단하여 홀로 가다 비를 만나 젖으면 원망이 있으나 허물이 없다."}, {"han": "구사(九四)：臀無膚，其行次且，牽羊悔亡，聞言不信。", "en": "There is no skin on his thighs, and walking comes hard. If a man were to let himself be led like a sheep, remorse would disappear. But if these words are heard they will not be believed.", "ko": "엉덩이에 살갗이 없어 걷기가 힘드니 양처럼 이끌리면 후회가 없어지나 말을 들어도 믿지 않는다."}, {"han": "구오(九五)：莧陸夬夬，中行無咎。", "en": "In dealing with weeds, firm resolution is necessary. Walking in the middle remains without blame.", "ko": "비름과 쑥을 결단하듯이 하니 중도를 걸으면 허물이 없다."}, {"han": "상육(上六)：無號，終有凶。", "en": "No cry. In the end misfortune comes.", "ko": "호령이 없으니 마침내 흉함이 있다."}]}, "2-2": {"number": 58, "name": {"han": "兌", "ko": "중택태", "en": "The Joyous"}, "judgment": {"han": "兌。亨，利貞。", "en": "THE JOYOUS. Success. Perseverance is favorable.", "ko": "태는 형통하고 바름이 이롭다."}, "lines": [{"han": "초구(初九)：和兌，吉。", "en": "Contented joyousness. Good fortune.", "ko": "화락하게 기뻐하니 길하다."}, {"han": "구이(九二)：孚兌，吉，悔亡。", "en": "Sincere joyousness. Good fortune. Remorse disappears.", "ko": "믿음으로 기뻐하니 길하고 후회가 없어진다."}, {"han": "육삼(六三)：來兌，凶。", "en": "Coming joyousness. Misfortune.", "ko": "와서 기뻐하니 흉하다."}, {"han": "구사(九四)：商兌未寧，介疾有喜。", "en": "Joyousness that is weighed and considered, not yet at rest. Man rids himself of mistakes after pondering them.", "ko": "헤아리며 기뻐하나 아직 편안하지 않으니 병을 경계하면 기쁨이 있다."}, {"han": "구오(九五)：孚于剝，有厲。", "en": "Sincerity toward disintegrating influences is dangerous.", "ko": "박괘에 믿음을 두니 위태로움이 있다."}, {"han": "상육(上六)：引兌。", "en": "Seductive joyousness.", "ko": "이끌려 기뻐하도다."}]}, "2-3": {"number": 49, "name": {"han": "革", "ko": "택화혁", "en": "Revolution"}, "judgment": {"han": "革。已日乃孚，元亨利貞，悔亡。", "en": "REVOLUTION. On your own day you are believed. Supreme success, furthering through perseverance. Remorse disappears.", "ko": "혁은 기일이 되어야 믿음을 얻으니 크게 형통하고 바름이 이로우며 후회가 없어진다."}, "lines": [{"han": "초구(初九)：鞏用黃牛之革。", "en": "Wrapped in the hide of a yellow cow.", "ko": "황소 가죽으로 단단히 묶는다."}, {"han": "육이(六二)：已日乃革之，征吉，無咎。", "en": "When one's own day comes, one may create revolution. Starting brings good fortune. No blame.", "ko": "기일이 되어 혁신하니 나아가면 길하고 허물이 없다."}, {"han": "구삼(九三)：征凶，貞厲，革言三就，有孚。", "en": "Starting brings misfortune. Perseverance brings danger. When talk of revolution has gone the rounds three times, one may commit himself, and men will believe him.", "ko": "나아가면 흉하고 바름이 위태롭다. 혁신의 말이 세 번 이루어지면 믿음이 있다."}, {"han": "구사(九四)：悔亡，有孚，改命吉。", "en": "Remorse disappears. Men believe him. Changing the form of government brings good fortune.", "ko": "후회가 없어지니 믿음이 있어 명을 고치면 길하다."}, {"han": "구오(九五)：大人虎變，未占有孚。", "en": "The great man changes like a tiger. Even before he questions the oracle he is believed.", "ko": "대인은 호랑이처럼 변하니 점치기 전에도 믿음이 있다."}, {"han": "상육(上六)：君子豹變，小人革面，征凶，居貞吉。", "en": "The superior man changes like a leopard. The inferior man molts in the face. Starting brings misfortune. To remain persevering brings good fortune.", "ko": "군자는 표범처럼 변하고 소인은 얼굴만 바꾸니 나아가면 흉하고 바름에 거하면 길하다."}]}, "2-4": {"number": 17, "name": {"han": "隨", "ko": "택뢰수", "en": "Following"}, "judgment": {"han": "隨。元亨利貞，無咎。", "en": "FOLLOWING has supreme success. Perseverance brings good fortune. No blame.", "ko": "수는 크게 형통하고 바름이 이로우니 허물이 없다."}, "lines": [{"han": "초구(初九)：官有渝，貞吉。出門交有功。", "en": "The standard is changing. Perseverance brings good fortune. To go out of the door in company produces deeds.", "ko": "관직에 변화가 있으니 바름이 길하다. 문을 나가 사귀면 공이 있다."}, {"han": "육이(六二)：係小子，失丈夫。", "en": "If one clings to the little boy, one loses the strong man.", "ko": "어린아이에게 매이면 장부를 잃는다."}, {"han": "육삼(六三)：係丈夫，失小子。隨有求得，利居貞。", "en": "If one clings to the strong man, one loses the little boy. Through following one finds what one seeks. It furthers one to remain persevering.", "ko": "장부에게 매이면 어린아이를 잃는다. 따름에서 구하면 얻으니 바름에 머무름이 이롭다."}, {"han": "구사(九四)：隨有獲，貞凶。有孚在道，以明，何咎。", "en": "Following creates success. Perseverance brings misfortune. To go one's way with sincerity brings clarity. How could there be blame in this?", "ko": "따름에 얻음이 있으나 바름이 흉하다. 믿음이 있어 도에 있으면 밝음으로써 어찌 허물이 있으리오."}, {"han": "구오(九五)：孚于嘉，吉。", "en": "Sincere in the good. Good fortune.", "ko": "아름다운 것에 믿음이 있으니 길하다."}, {"han": "상육(上六)：拘係之，乃從維之。王用亨于西山。", "en": "He meets with firm allegiance and is still further bound. The king introduces him to the Western Mountain.", "ko": "붙들어 매어 따르게 하니 왕이 서산에서 제사를 지낸다."}]}, "2-5": {"number": 28, "name": {"han": "大過", "ko": "택풍대과", "en": "Preponderance of the Great"}, "judgment": {"han": "大過。棟橈，利有攸往，亨。", "en": "PREPONDERANCE OF THE GREAT. The ridgepole sags to the breaking point. It furthers one to have somewhere to go. Success.", "ko": "대과는 들보가 휘어지니 나아갈 바가 있음이 이롭고 형통하다."}, "lines": [{"han": "초육(初六)：藉用白茅，無咎。", "en": "To spread white rushes underneath. No blame.", "ko": "흰 띠풀을 깔아 쓰니 허물이 없다."}, {"han": "구이(九二)：枯楊生稊，老夫得其女妻，無不利。", "en": "A dry poplar sprouts at the root. An older man takes a young wife. Everything furthers.", "ko": "마른 버드나무에 싹이 나니 늙은 남자가 젊은 아내를 얻으니 이롭지 않음이 없다."}, {"han": "구삼(九三)：棟橈，凶。", "en": "The ridgepole sags to the breaking point. Misfortune.", "ko": "들보가 휘어지니 흉하다."}, {"han": "구사(九四)：棟隆，吉，有它吝。", "en": "The ridgepole is braced. Good fortune. If there are ulterior motives, it is humiliating.", "ko": "들보가 솟으니 길하나 다른 것이 있으면 인색하다."}, {"han": "구오(九五)：枯楊生華，老婦得其士夫，無咎無譽。", "en": "A withered poplar puts forth flowers. An older woman takes a husband. No blame. No praise.", "ko": "마른 버드나무에 꽃이 피니 늙은 여자가 남편을 얻으나 허물도 없고 칭예도 없다."}, {"han": "상육(上六)：過涉滅頂，凶，無咎。", "en": "One must go through the water. It goes over one's head. Misfortune. No blame.", "ko": "물을 건너다 머리까지 잠기니 흉하나 허물은 없다."}]}, "2-6": {"number": 47, "name": {"han": "困", "ko": "택수곤", "en": "Oppression"}, "judgment": {"han": "困。亨，貞，大人吉，無咎，有言不信。", "en": "OPPRESSION. Success. Perseverance. The great man brings about good fortune. No blame. When one has something to say, it is not believed.", "ko": "곤은 형통하고 바름이니 대인이면 길하고 허물이 없다. 말이 있어도 믿음을 받지 못한다."}, "lines": [{"han": "초육(初六)：臀困于株木，入于幽谷，三歲不覿。", "en": "One sits oppressed under a bare tree and strays into a gloomy valley. For three years one sees nothing.", "ko": "엉덩이가 그루터기에 눌리니 어두운 골짜기로 들어가 삼 년 동안 보지 못한다."}, {"han": "구이(九二)：困于酒食，朱紱方來，利用享祀，征凶，無咎。", "en": "One is oppressed while at meat and drink. The man with the scarlet knee bands is just coming. It furthers one to offer sacrifice. To set forth brings misfortune. No blame.", "ko": "술과 음식으로 곤궁하니 붉은 무릎 가리개를 한 자가 오는 중이다. 제사를 드림이 이롭고 나아가면 흉하나 허물이 없다."}, {"han": "육삼(六三)：困于石，據于蒺藜，入于其宮，不見其妻，凶。", "en": "One is oppressed by stone, and leans on thorns and thistles. One enters the house and does not see one's wife. Misfortune.", "ko": "돌에 막히고 가시덤불에 기대니 집에 들어가도 아내를 보지 못하니 흉하다."}, {"han": "구사(九四)：來徐徐，困于金車，吝，有終。", "en": "He comes very slowly. He is oppressed in a golden carriage. Humiliation, but the end is reached.", "ko": "천천히 오니 금수레에서 곤궁하나 인색하나 끝이 있다."}, {"han": "구오(九五)：劓刖，困于赤紱，乃徐有說，利用祭祀。", "en": "His nose and feet are cut off. Oppression at the hands of the man with the purple knee bands. Joy comes softly. It furthers one to make offerings and libations.", "ko": "코와 발이 잘리고 붉은 무릎 가리개를 한 자에게 곤궁하니 천천히 기쁨이 오니 제사를 드림이 이롭다."}, {"han": "상육(上六)：困于葛藟，于臲卼，曰動悔，有悔，征吉。", "en": "He is oppressed by creeping vines. He moves uncertainly and says, Movement brings remorse. If one feels remorse over this and makes a start, good fortune comes.", "ko": "칡덩굴에 얽히고 흔들거리니 움직이면 후회가 있다고 하나 후회가 있으면 나아가 길하다."}]}, "2-7": {"number": 31, "name": {"han": "咸", "ko": "택산함", "en": "Influence"}, "judgment": {"han": "咸。亨，利貞，取女吉。", "en": "INFLUENCE. Success. Perseverance furthers. To take a maiden to wife brings good fortune.", "ko": "함은 형통하고 바름이 이로우니 여자를 취함이 길하다."}, "lines": [{"han": "초육(初六)：咸其拇。", "en": "The influence shows itself in the big toe.", "ko": "엄지발가락에 느낌이 있다."}, {"han": "육이(六二)：咸其腓，凶，居吉。", "en": "The influence shows itself in the calves of the legs. Misfortune. Tarrying brings good fortune.", "ko": "장딴지에 느낌이 있으니 흉하나 머무르면 길하다."}, {"han": "구삼(九三)：咸其股，執其隨，往吝。", "en": "The influence shows itself in the thighs. Holds to that which follows it. To continue is humiliating.", "ko": "넓적다리에 느낌이 있어 따르는 것을 잡으니 나아가면 인색하다."}, {"han": "구사(九四)：貞吉悔亡，憧憧往來，朋從爾思。", "en": "Perseverance brings good fortune. Remorse disappears. If a man is agitated in mind, and his thoughts go hither and thither, only those friends on whom he fixes his conscious thoughts will follow.", "ko": "바름이 길하고 후회가 없어지나 마음이 흔들려 오락가락하면 벗들이 너의 생각만 따른다."}, {"han": "구오(九五)：咸其脢，無悔。", "en": "The influence shows itself in the back of the neck. No remorse.", "ko": "등에 느낌이 있으니 후회가 없다."}, {"han": "상육(上六)：咸其輔頰舌。", "en": "The influence shows itself in the jaws, cheeks, and tongue.", "ko": "볼과 뺨과 혀에 느낌이 있다."}]}, "2-8": {"number": 45, "name": {"han": "萃", "ko": "택지췌", "en": "Gathering Together"}, "judgment": {"han": "萃。亨，王假有廟，利見大人，亨，利貞。用大牲吉，利有攸往。", "en": "GATHERING TOGETHER. Success. The king approaches his temple. It furthers one to see the great man. This brings success. Perseverance furthers. To bring great offerings creates good fortune. It furthers one to undertake something.", "ko": "췌는 형통하니 왕이 묘에 이르고 대인을 만나봄이 이롭고 형통하며 바름이 이롭다. 큰 제물을 씀이 길하고 나아갈 바가 있음이 이롭다."}, "lines": [{"han": "초육(初六)：有孚不終，乃亂乃萃，若號，一握為笑，勿恤，往無咎。", "en": "If you are sincere, but not to the end, there will sometimes be confusion, sometimes gathering together. If you call out, then after one grasp of the hand you can laugh again. Regret not. Going is without blame.", "ko": "믿음이 있으나 끝까지 하지 않으면 혼란이 있고 모임이 있으니 호령하면 한번 악수하고 웃을 수 있다. 걱정하지 말고 나아가면 허물이 없다."}, {"han": "육이(六二)：引吉，無咎，孚乃利用禴。", "en": "Letting oneself be drawn brings good fortune and remains blameless. If one is sincere, it furthers one to bring even a small offering.", "ko": "이끌리면 길하고 허물이 없으니 믿음이 있으면 약소한 제사를 드림이 이롭다."}, {"han": "육삼(六三)：萃如嗟如，無攸利，往無咎，小吝。", "en": "Gathering together amid sighs. Nothing that would further. Going is without blame. Slight humiliation.", "ko": "모이면서 탄식하니 이로울 바가 없고 나아가면 허물이 없으나 약간 인색하다."}, {"han": "구사(九四)：大吉，無咎。", "en": "Great good fortune. No blame.", "ko": "크게 길하고 허물이 없다."}, {"han": "구오(九五)：萃有位，無咎。匪孚，元永貞，悔亡。", "en": "If in gathering together one has position, this brings no blame. If there are some who are not yet sincerely in the work, sublime and enduring perseverance is needed. Then remorse disappears.", "ko": "모임에 지위가 있으니 허물이 없다. 믿음이 없는 자가 있으면 크고 영원한 바름이 필요하니 후회가 없어진다."}, {"han": "상육(上六)：齎咨涕洟，無咎。", "en": "Lamenting and sighing, floods of tears. No blame.", "ko": "탄식하고 눈물을 흘리니 허물이 없다."}]}, "3-1": {"number": 14, "name": {"han": "大有", "ko": "화천대유", "en": "Possession in Great Measure"}, "judgment": {"han": "大有。元亨。", "en": "POSSESSION IN GREAT MEASURE. Supreme success.", "ko": "대유는 크게 형통하다."}, "lines": [{"han": "초구(初九)：無交害，匪咎，艱則無咎。", "en": "No relationship with what is harmful; there is no blame in this. If one remains conscious of difficulty, one remains without blame.", "ko": "해로운 것과 사귀지 않으니 허물이 아니라 어려움을 알면 허물이 없다."}, {"han": "구이(九二)：大車以載，有攸往，無咎。", "en": "A big wagon for loading. One may undertake something. No blame.", "ko": "큰 수레에 실으니 나아갈 바가 있어도 허물이 없다."}, {"han": "구삼(九三)：公用亨于天子，小人弗克。", "en": "A prince offers it to the Son of Heaven. A petty man cannot do this.", "ko": "공이 천자에게 바치니 소인은 할 수 없다."}, {"han": "구사(九四)：匪其彭，無咎。", "en": "He makes a difference between himself and his neighbor. No blame.", "ko": "그 성함을 자랑하지 않으니 허물이 없다."}, {"han": "육오(六五)：厥孚交如，威如，吉。", "en": "He whose truth is accessible, yet dignified, has good fortune.", "ko": "그 믿음이 사귀는 듯하고 위엄이 있으니 길하다."}, {"han": "상구(上九)：自天祐之，吉，無不利。", "en": "He is blessed by heaven. Good fortune. Nothing that does not further.", "ko": "하늘로부터 도움이 있으니 길하고 이롭지 않음이 없다."}]}, "3-2": {"number": 38, "name": {"han": "睽", "ko": "화택규", "en": "Opposition"}, "judgment": {"han": "睽。小事吉。", "en": "OPPOSITION. In small matters, good fortune.", "ko": "규는 작은 일에 길하다."}, "lines": [{"han": "초구(初九)：悔亡，喪馬勿逐，自復；見惡人，無咎。", "en": "Remorse disappears. If you lose your horse, do not run after it; it will come back of its own accord. When you see evil people, guard yourself against mistakes.", "ko": "후회가 없어지니 말을 잃어도 쫓지 않으면 스스로 돌아온다. 악한 사람을 보아도 허물이 없다."}, {"han": "구이(九二)：遇主于巷，無咎。", "en": "One meets his lord in a narrow street. No blame.", "ko": "골목에서 주인을 만나니 허물이 없다."}, {"han": "육삼(六三)：見輿曳，其牛掣，其人天且劓，無初有終。", "en": "One sees the wagon dragged back, the oxen halted, a man's hair and nose cut off. Not a good beginning, but a good end.", "ko": "수레가 뒤로 끌리고 소가 멈추며 사람의 머리카락과 코가 잘리니 처음은 없으나 끝이 있다."}, {"han": "구사(九四)：睽孤，遇元夫，交孚，厲，無咎。", "en": "Isolated through opposition, one meets a like-minded man with whom one can associate in good faith. Despite the danger, no blame.", "ko": "대립하여 홀로이나 원기 있는 남자를 만나 믿음으로 사귀니 위태로우나 허물이 없다."}, {"han": "육오(六五)：悔亡，厥宗噬膚，往何咎。", "en": "Remorse disappears. The companion bites his way through the wrappings. If one goes to him, how could it be a mistake?", "ko": "후회가 없어지니 그 종족이 살갗을 씹어 나아가면 어찌 허물이 있으리오."}, {"han": "상구(上九)：睽孤，見豕負塗，載鬼一車，先張之弧，後說之弧，匪寇婚媾，往遇雨則吉。", "en": "Isolated through opposition, one sees one's companion as a pig covered with dirt, as a wagon full of devils. First one draws a bow against him, then one lays the bow aside. He is not a robber; he will woo at the right time. As one goes, rain falls; then good fortune comes.", "ko": "대립하여 홀로이나 진흙을 뒤집어쓴 돼지와 귀신을 가득 실은 수레를 보니 먼저 활을 당겼다가 나중에 활을 내려놓는다. 도적이 아니라 혼인하려는 것이니 나아가 비를 만나면 길하다."}]}, "3-3": {"number": 30, "name": {"han": "離", "ko": "중화리", "en": "The Clinging"}, "judgment": {"han": "離。利貞，亨，畜牝牛，吉。", "en": "THE CLINGING. Perseverance furthers. It brings success. Care of the cow brings good fortune.", "ko": "리는 바름이 이롭고 형통하니 암소를 기르면 길하다."}, "lines": [{"han": "초구(初九)：履錯然，敬之，無咎。", "en": "The footprints run crisscross. If one is seriously intent, no blame.", "ko": "발걸음이 어지럽게 뒤섞이니 공경하면 허물이 없다."}, {"han": "육이(六二)：黃離，元吉。", "en": "Yellow light. Supreme good fortune.", "ko": "황색 빛이니 크게 길하다."}, {"han": "구삼(九三)：日昃之離，不鼓缶而歌，則大耋之嗟，凶。", "en": "In the light of the setting sun, men either beat the pot and sing or loudly bewail the approach of old age. Misfortune.", "ko": "해가 기울 때의 리이니 장구를 치고 노래하지 않으면 노인의 탄식이 있어 흉하다."}, {"han": "구사(九四)：突如其來如，焚如，死如，棄如。", "en": "Its coming is sudden; it flames up, dies down, is thrown away.", "ko": "갑자기 오니 불타오르다 꺼지고 버려진다."}, {"han": "육오(六五)：出涕沱若，戚嗟若，吉。", "en": "Tears in floods, sighing and lamenting. Good fortune.", "ko": "눈물이 흘러내리고 슬퍼하며 탄식하니 길하다."}, {"han": "상구(上九)：王用出征，有嘉折首，獲匪其醜，無咎。", "en": "The king uses him to march forth and chastise. Then it is best to kill the leaders and take captive the followers. No blame.", "ko": "왕이 출정하여 우두머리를 쳐서 공을 세우고 따르는 자를 잡되 그 무리는 아니니 허물이 없다."}]}, "3-4": {"number": 21, "name": {"han": "噬嗑", "ko": "화뢰서합", "en": "Biting Through"}, "judgment": {"han": "噬嗑。亨。利用獄。", "en": "BITING THROUGH has success. It is favorable to let justice be administered.", "ko": "서합은 형통하니 옥사를 씀이 이롭다."}, "lines": [{"han": "초구(初九)：屨校滅趾，無咎。", "en": "His feet are fastened in the stocks so that his toes disappear. No blame.", "ko": "발에 차꼬를 채워 발가락이 사라지니 허물이 없다."}, {"han": "육이(六二)：噬膚滅鼻，無咎。", "en": "Bites through tender meat, so that his nose disappears. No blame.", "ko": "살갗을 씹어 코가 사라지니 허물이 없다."}, {"han": "육삼(六三)：噬腊肉，遇毒；小吝，無咎。", "en": "Bites on old dried meat and strikes on something poisonous. Slight humiliation. No blame.", "ko": "말린 고기를 씹다가 독을 만나니 약간 인색하나 허물은 없다."}, {"han": "구사(九四)：噬乾胏，得金矢；利艱貞，吉。", "en": "Bites on dried gristly meat. Receives metal arrows. It furthers one to be mindful of difficulties and to be persevering. Good fortune.", "ko": "뼈가 붙은 말린 고기를 씹어 금화살을 얻으니 어려움을 생각하고 바름을 지킴이 이롭고 길하다."}, {"han": "육오(六五)：噬乾肉，得黃金；貞厲，無咎。", "en": "Bites on dried lean meat. Receives yellow gold. Perseverance brings awareness of danger. No blame.", "ko": "말린 살코기를 씹어 황금을 얻으니 바름을 지키되 위태로움을 알면 허물이 없다."}, {"han": "상구(上九)：何校滅耳，凶。", "en": "His neck is fastened in the wooden cangue, so that his ears disappear. Misfortune.", "ko": "목에 칼을 써서 귀가 사라지니 흉하다."}]}, "3-5": {"number": 50, "name": {"han": "鼎", "ko": "화풍정", "en": "The Cauldron"}, "judgment": {"han": "鼎。元吉，亨。", "en": "THE CAULDRON. Supreme good fortune. Success.", "ko": "정은 크게 길하고 형통하다."}, "lines": [{"han": "초육(初六)：鼎顛趾，利出否，得妾以其子，無咎。", "en": "A ting with legs upturned. Furthers removal of stagnating stuff. One takes a concubine for the sake of her son. No blame.", "ko": "솥의 발이 뒤집어지니 비색함을 제거함이 이롭다. 그 아들을 위해 첩을 얻으니 허물이 없다."}, {"han": "구이(九二)：鼎有實，我仇有疾，不我能即，吉。", "en": "There is food in the ting. My comrades are envious, but they cannot harm me. Good fortune.", "ko": "솥에 음식이 있으니 나의 원수가 병이 있어 나에게 다가오지 못하니 길하다."}, {"han": "구삼(九三)：鼎耳革，其行塞，雉膏不食，方雨虧悔，終吉。", "en": "The handle of the ting is altered. One is impeded in his way of life. The fat of the pheasant is not eaten. Once rain falls, remorse is spent. Good fortune comes in the end.", "ko": "솥의 귀가 변하니 그 행함이 막혀 꿩의 기름을 먹지 못한다. 비가 오면 후회가 줄어들어 마침내 길하다."}, {"han": "구사(九四)：鼎折足，覆公餗，其形渥，凶。", "en": "The legs of the ting are broken. The prince's meal is spilled and his person is soiled. Misfortune.", "ko": "솥의 발이 부러져 공의 음식이 엎질러지고 몸이 더럽혀지니 흉하다."}, {"han": "육오(六五)：鼎黃耳金鉉，利貞。", "en": "The ting has yellow handles, golden carrying rings. Perseverance furthers.", "ko": "솥에 황금 귀와 황금 들쇠가 있으니 바름이 이롭다."}, {"han": "상구(上九)：鼎玉鉉，大吉，無不利。", "en": "The ting has rings of jade. Great good fortune. Nothing that would not act to further.", "ko": "솥에 옥 들쇠가 있으니 크게 길하고 이롭지 않음이 없다."}]}, "3-6": {"number": 64, "name": {"han": "未濟", "ko": "화수미제", "en": "Before Completion"}, "judgment": {"han": "未濟。亨，小狐汔濟，濡其尾，無攸利。", "en": "BEFORE COMPLETION. Success. But if the little fox, after nearly completing the crossing, gets his tail in the water, there is nothing that would further.", "ko": "미제는 형통하나 어린 여우가 거의 건너다가 꼬리를 물에 적시면 이로울 바가 없다."}, "lines": [{"han": "초육(初六)：濡其尾，吝。", "en": "He gets his tail in the water. Humiliating.", "ko": "꼬리를 물에 적시니 인색하다."}, {"han": "구이(九二)：曳其輪，貞吉。", "en": "He brakes his wheels. Perseverance brings good fortune.", "ko": "수레바퀴를 끄니 바름이 길하다."}, {"han": "육삼(六三)：未濟，征凶，利涉大川。", "en": "Before completion, attack brings misfortune. It furthers one to cross the great water.", "ko": "미제에 나아가면 흉하나 큰 강을 건넘이 이롭다."}, {"han": "구사(九四)：貞吉，悔亡，震用伐鬼方，三年有賞于大國。", "en": "Perseverance brings good fortune. Remorse disappears. Shock is used to discipline the Devil's Country. For three years, great realms are awarded.", "ko": "바름이 길하고 후회가 없어지니 우레로 귀방을 정벌하여 삼 년이면 대국에서 상을 받는다."}, {"han": "육오(六五)：貞吉，無悔，君子之光，有孚，吉。", "en": "Perseverance brings good fortune. No remorse. The light of the superior man is true. Good fortune.", "ko": "바름이 길하고 후회가 없으니 군자의 빛이 참되어 믿음이 있으니 길하다."}, {"han": "상구(上九)：有孚于飲酒，無咎。濡其首，有孚失是。", "en": "There is drinking of wine in genuine confidence. No blame. But if one wets his head, he loses it, in truth.", "ko": "믿음으로 술을 마시니 허물이 없다. 머리를 적시면 믿음이 있어도 이를 잃는다."}]}, "3-7": {"number": 56, "name": {"han": "旅", "ko": "화산려", "en": "The Wanderer"}, "judgment": {"han": "旅。小亨，旅貞吉。", "en": "THE WANDERER. Success through smallness. Perseverance brings good fortune to the wanderer.", "ko": "려는 작게 형통하니 나그네가 바름을 지키면 길하다."}, "lines": [{"han": "초육(初六)：旅瑣瑣，斯其所取災。", "en": "If the wanderer busies himself with trivial things, he draws down misfortune upon himself.", "ko": "나그네가 번잡한 일에 매이니 이로써 재앙을 자초한다."}, {"han": "육이(六二)：旅即次，懷其資，得童僕貞。", "en": "The wanderer comes to an inn. He has his property with him. He wins the steadfastness of a young servant.", "ko": "나그네가 여관에 이르러 재물을 품고 어린 하인의 바름을 얻는다."}, {"han": "구삼(九三)：旅焚其次，喪其童僕，貞厲。", "en": "The wanderer's inn burns down. He loses the steadfastness of his young servant. Danger.", "ko": "나그네의 여관이 불타고 어린 하인을 잃으니 바름이 위태롭다."}, {"han": "구사(九四)：旅于處，得其資斧，我心不快。", "en": "The wanderer rests in a shelter. He obtains his property and an ax. My heart is not glad.", "ko": "나그네가 처소에 머물러 재물과 도끼를 얻으나 내 마음이 기쁘지 않다."}, {"han": "육오(六五)：射雉，一矢亡，終以譽命。", "en": "He shoots a pheasant. It drops with the first arrow. In the end this brings both praise and office.", "ko": "꿩을 쏘아 화살 하나로 잡으니 마침내 명예와 관직을 얻는다."}, {"han": "상구(上九)：鳥焚其巢，旅人先笑後號咷，喪牛于易，凶。", "en": "The bird's nest burns up. The wanderer laughs at first, then must needs lament and weep. Through carelessness he loses his cow. Misfortune.", "ko": "새의 둥지가 불타니 나그네가 먼저 웃다가 나중에 울부짖는다. 쉽게 소를 잃으니 흉하다."}]}, "3-8": {"number": 35, "name": {"han": "晉", "ko": "화지진", "en": "Progress"}, "judgment": {"han": "晉。康侯用錫馬蕃庶，晝日三接。", "en": "PROGRESS. The powerful prince is honored with horses in large numbers. In a single day he is granted audience three times.", "ko": "진은 강후가 말을 많이 하사받으니 하루에 세 번 접견한다."}, "lines": [{"han": "초육(初六)：晉如，摧如，貞吉。罔孚，裕，無咎。", "en": "Progressing, but turned back. Perseverance brings good fortune. If one meets with no confidence, one should remain calm. No mistake.", "ko": "나아가는 듯하다가 꺾이니 바름이 길하다. 믿음을 얻지 못해도 여유로우면 허물이 없다."}, {"han": "육이(六二)：晉如，愁如，貞吉。受茲介福，于其王母。", "en": "Progressing, but in sorrow. Perseverance brings good fortune. Then one obtains great happiness from one's ancestress.", "ko": "나아가는 듯하다가 슬퍼하니 바름이 길하다. 이 큰 복을 왕모에게서 받는다."}, {"han": "육삼(六三)：衆允，悔亡。", "en": "All are in accord. Remorse disappears.", "ko": "모두가 동의하니 후회가 없어진다."}, {"han": "구사(九四)：晉如鼫鼠，貞厲。", "en": "Progress like a hamster. Perseverance brings danger.", "ko": "다람쥐처럼 나아가니 바름이 위태롭다."}, {"han": "육오(六五)：悔亡，失得勿恤，往吉，無不利。", "en": "Remorse disappears. Take not gain and loss to heart. Undertakings bring good fortune. Everything serves to further.", "ko": "후회가 없어지니 얻고 잃음을 마음에 두지 말라. 나아가면 길하고 이롭지 않음이 없다."}, {"han": "상구(上九)：晉其角，維用伐邑，厲吉，無咎，貞吝。", "en": "Making progress with the horns is permissible only for the purpose of punishing one's own city. To be conscious of danger brings good fortune. No blame. Perseverance brings humiliation.", "ko": "뿔로 나아가니 오직 읍을 치는 데 씀이 이로우나 위태로움을 알면 길하고 허물이 없으며 바름이 인색하다."}]}, "4-1": {"number": 34, "name": {"han": "大壯", "ko": "뇌천대장", "en": "The Power of the Great"}, "judgment": {"han": "大壯。利貞。", "en": "THE POWER OF THE GREAT. Perseverance furthers.", "ko": "대장은 바름이 이롭다."}, "lines": [{"han": "초구(初九)：壯于趾，征凶，有孚。", "en": "Power in the toes. Continuing brings misfortune. This is certainly true.", "ko": "발가락에 힘이 있으니 나아가면 흉하고 믿음이 있다."}, {"han": "구이(九二)：貞吉。", "en": "Perseverance brings good fortune.", "ko": "바름이 길하다."}, {"han": "구삼(九三)：小人用壯，君子用罔，貞厲。羝羊觸藩，羸其角。", "en": "An inferior man works through power. A superior man does not act thus. To continue is dangerous. A goat butts against a hedge and gets its horns entangled.", "ko": "소인은 힘으로 쓰고 군자는 그물을 쓰니 바름이 위태롭다. 숫양이 울타리를 들이받아 뿔이 걸린다."}, {"han": "구사(九四)：貞吉悔亡，藩決不羸，壯于大輿之輹。", "en": "Perseverance brings good fortune. Remorse disappears. The hedge opens; there is no entanglement. Power depends upon the axle of a big cart.", "ko": "바름이 길하고 후회가 없어지며 울타리가 열려 걸리지 않으니 큰 수레의 바퀴축에 힘이 있다."}, {"han": "육오(六五)：喪羊于易，無悔。", "en": "Loses the goat with ease. No remorse.", "ko": "쉽게 양을 잃으니 후회가 없다."}, {"han": "상육(上六)：羝羊觸藩，不能退，不能遂，無攸利，艱則吉。", "en": "A goat butts against a hedge. It cannot go backward, it cannot go forward. Nothing serves to further. If one notes the difficulty, this brings good fortune.", "ko": "숫양이 울타리를 들이받아 물러나지도 나아가지도 못하니 이로울 바가 없고 어려움을 알면 길하다."}]}, "4-2": {"number": 54, "name": {"han": "歸妹", "ko": "뇌택귀매", "en": "The Marrying Maiden"}, "judgment": {"han": "歸妹。征凶，無攸利。", "en": "THE MARRYING MAIDEN. Undertakings bring misfortune. Nothing that would further.", "ko": "귀매는 나아가면 흉하고 이로울 바가 없다."}, "lines": [{"han": "초구(初九)：歸妹以娣，跛能履，征吉。", "en": "The marrying maiden as a concubine. A lame man who is able to tread. Undertakings bring good fortune.", "ko": "시집가는 여자가 잉첩으로 가니 절름발이가 밟을 수 있으니 나아가면 길하다."}, {"han": "구이(九二)：眇能視，利幽人之貞。", "en": "A one-eyed man who is able to see. The perseverance of a solitary man furthers.", "ko": "애꾸눈이 볼 수 있으니 은둔한 사람의 바름이 이롭다."}, {"han": "육삼(六三)：歸妹以須，反歸以娣。", "en": "The marrying maiden as a slave. She marries as a concubine.", "ko": "시집가는 여자가 기다리는 신분으로 가니 돌아와 잉첩으로 시집간다."}, {"han": "구사(九四)：歸妹愆期，遲歸有時。", "en": "The marrying maiden draws out the allotted time. A late marriage comes in due course.", "ko": "시집가는 여자가 기한을 넘기니 늦게 시집가도 때가 있다."}, {"han": "육오(六五)：帝乙歸妹，其君之袂，不如其娣之袂良，月幾望，吉。", "en": "The sovereign I gave his daughter in marriage. The embroidered garments of the princess were not as gorgeous as those of the servingmaid. The moon that is nearly full brings good fortune.", "ko": "제을이 딸을 시집보내니 그 군주의 소매가 잉첩의 소매만 못하다. 달이 거의 차니 길하다."}, {"han": "상육(上六)：女承筐無實，士刲羊無血，無攸利。", "en": "The woman holds the basket, but there are no fruits in it. The man stabs the sheep, but no blood flows. Nothing that acts to further.", "ko": "여자가 광주리를 받드나 열매가 없고 남자가 양을 찌르나 피가 없으니 이로울 바가 없다."}]}, "4-3": {"number": 55, "name": {"han": "豐", "ko": "뇌화풍", "en": "Abundance"}, "judgment": {"han": "豐。亨，王假之，勿憂，宜日中。", "en": "ABUNDANCE has success. The king attains abundance. Be not sad. Be like the sun at midday.", "ko": "풍은 형통하니 왕이 이에 이른다. 걱정하지 말고 한낮의 태양처럼 해야 한다."}, "lines": [{"han": "초구(初九)：遇其配主，雖旬無咎，往有尚。", "en": "When a man meets his destined ruler, they can be together ten days, and it is not a mistake. Going meets with recognition.", "ko": "배필을 만나니 열흘이 되어도 허물이 없고 나아가면 높임이 있다."}, {"han": "육이(六二)：豐其蔀，日中見斗，往得疑疾，有孚發若，吉。", "en": "The curtain is of such fullness that the polestars can be seen at noon. Through going one meets with mistrust and hate. If one rouses him through truth, good fortune comes.", "ko": "가림막이 넘치니 한낮에 북두성을 본다. 나아가면 의심과 미움을 받으나 믿음으로 일깨우면 길하다."}, {"han": "구삼(九三)：豐其沛，日中見沫，折其右肱，無咎。", "en": "The underbrush is of such abundance that the small stars can be seen at noon. He breaks his right arm. No blame.", "ko": "덮개가 넘치니 한낮에 작은 별들을 본다. 오른팔이 부러지니 허물이 없다."}, {"han": "구사(九四)：豐其蔀，日中見斗，遇其夷主，吉。", "en": "The curtain is of such fullness that the polestars can be seen at noon. He meets his ruler, who is of like kind. Good fortune.", "ko": "가림막이 넘치니 한낮에 북두성을 본다. 동류의 주인을 만나니 길하다."}, {"han": "육오(六五)：來章，有慶譽，吉。", "en": "Lines are coming, blessing and fame draw near. Good fortune.", "ko": "빛남이 오니 경사와 명예가 있어 길하다."}, {"han": "상육(上六)：豐其屋，蔀其家，闚其戶，闃其無人，三歲不覿，凶。", "en": "His house is in a state of abundance. He screens off his family. He peers through the gate and no longer perceives anyone within. For three years he sees nothing. Misfortune.", "ko": "집이 넘치도록 크고 집안을 가리니 그 문을 엿보아도 사람이 없다. 삼 년이 되도록 보지 못하니 흉하다."}]}, "4-4": {"number": 51, "name": {"han": "震", "ko": "중뢰진", "en": "The Arousing"}, "judgment": {"han": "震。亨，震來虩虩，笑言啞啞，震驚百里，不喪匕鬯。", "en": "SHOCK brings success. Shock comes — oh, oh! Laughing words — ha, ha! The shock terrifies for a hundred miles, and he does not let fall the sacrificial spoon and chalice.", "ko": "진은 형통하니 우레가 오면 두려워하다가 웃음소리가 나온다. 우레가 백 리를 놀라게 해도 숟가락과 술잔을 떨어뜨리지 않는다."}, "lines": [{"han": "초구(初九)：震來虩虩，後笑言啞啞，吉。", "en": "Shock comes — oh, oh! Then follow laughing words — ha, ha! Good fortune.", "ko": "우레가 오면 두려워하다가 이후에 웃음소리가 나오니 길하다."}, {"han": "육이(六二)：震來厲，億喪貝，躋于九陵，勿逐，七日得。", "en": "Shock comes bringing danger. A hundred thousand times you lose your treasures and must climb the nine hills. Do not go in pursuit of them. After seven days you will get them back again.", "ko": "우레가 와 위태로우니 재물을 잃고 구릉에 오르되 쫓지 말라. 칠 일이면 얻는다."}, {"han": "육삼(六三)：震蘇蘇，震行無眚。", "en": "Shock comes and makes one distraught. If shock spurs to action one remains free of misfortune.", "ko": "우레에 멍하니 우레에 행동하면 재앙이 없다."}, {"han": "구사(九四)：震遂泥。", "en": "Shock is mired.", "ko": "우레가 진흙에 빠진다."}, {"han": "육오(六五)：震往來厲，億無喪，有事。", "en": "Shock goes hither and thither — danger. However, nothing at all is lost. Yet there are things to be done.", "ko": "우레가 오고 가며 위태로우나 잃는 것은 없고 해야 할 일이 있다."}, {"han": "상육(上六)：震索索，視矍矍，征凶，震不于其躬，于其鄰，無咎。婚媾有言。", "en": "Shock brings ruin and terrified gazing around. Going ahead brings misfortune. If it has not yet touched one's own body but has reached one's neighbor first, there is no blame. One's comrades have something to talk about.", "ko": "우레에 떨고 두리번거리니 나아가면 흉하다. 우레가 자신에게는 이르지 않고 이웃에게 이르면 허물이 없다. 혼인에 말이 있다."}]}, "4-5": {"number": 32, "name": {"han": "恒", "ko": "뇌풍항", "en": "Duration"}, "judgment": {"han": "恒。亨，無咎，利貞，利有攸往。", "en": "DURATION. Success. No blame. Perseverance furthers. It furthers one to have somewhere to go.", "ko": "항은 형통하고 허물이 없으며 바름이 이롭고 나아갈 바가 있음이 이롭다."}, "lines": [{"han": "초육(初六)：浚恒，貞凶，無攸利。", "en": "Seeking duration too hastily brings misfortune persistently. Nothing that would further.", "ko": "항구함을 너무 깊이 구하니 바름이 흉하고 이로울 바가 없다."}, {"han": "구이(九二)：悔亡。", "en": "Remorse disappears.", "ko": "후회가 없어진다."}, {"han": "구삼(九三)：不恒其德，或承之羞，貞吝。", "en": "He who does not give duration to his character meets with disgrace. Persistent humiliation.", "ko": "그 덕을 항구히 하지 않으면 혹 부끄러움을 받으니 바름이 인색하다."}, {"han": "구사(九四)：田無禽。", "en": "No game in the field.", "ko": "밭에 짐승이 없다."}, {"han": "육오(六五)：恒其德，貞，婦人吉，夫子凶。", "en": "Giving duration to one's character through perseverance. This is good fortune for a woman, misfortune for a man.", "ko": "그 덕을 항구히 하여 바름을 지키니 부인은 길하고 장부는 흉하다."}, {"han": "상육(上六)：振恒，凶。", "en": "Restlessness as an enduring condition brings misfortune.", "ko": "항구함을 뒤흔드니 흉하다."}]}, "4-6": {"number": 40, "name": {"han": "解", "ko": "뇌수해", "en": "Deliverance"}, "judgment": {"han": "解。利西南，無所往，其來復吉；有攸往，夙吉。", "en": "DELIVERANCE. The southwest furthers. If there is no longer anything where one has to go, return brings good fortune. If there is still something where one has to go, hastening brings good fortune.", "ko": "해는 서남방이 이롭고 나아갈 바가 없으면 돌아옴이 길하며 나아갈 바가 있으면 빨리 함이 길하다."}, "lines": [{"han": "초육(初六)：無咎。", "en": "No blame.", "ko": "허물이 없다."}, {"han": "구이(九二)：田獲三狐，得黃矢，貞吉。", "en": "One kills three foxes in the field and receives a yellow arrow. Perseverance brings good fortune.", "ko": "밭에서 여우 세 마리를 잡아 황색 화살을 얻으니 바름이 길하다."}, {"han": "육삼(六三)：負且乘，致寇至，貞吝。", "en": "If a man carries a burden on his back and nonetheless rides in a carriage, he thereby invites an approach by robbers. Perseverance leads to humiliation.", "ko": "짐을 지고 수레를 타니 도적이 이르게 한다. 바름이 인색하다."}, {"han": "구사(九四)：解而拇，朋至斯孚。", "en": "Deliver yourself from your great toe. Then the companion comes, and him you can trust.", "ko": "엄지발가락에서 풀리니 벗이 이르면 믿을 수 있다."}, {"han": "육오(六五)：君子維有解，吉，有孚于小人。", "en": "If only the superior man can deliver himself, it brings good fortune. Thus he proves to inferior men that he is in earnest.", "ko": "군자만이 풀림이 있으니 길하고 소인에게 믿음이 있다."}, {"han": "상육(上六)：公用射隼，于高墉之上，獲之，無不利。", "en": "The prince shoots at a hawk on a high wall. He kills it. Everything serves to further.", "ko": "공이 높은 담 위의 매를 쏘아 잡으니 이롭지 않음이 없다."}]}, "4-7": {"number": 62, "name": {"han": "小過", "ko": "뇌산소과", "en": "Preponderance of the Small"}, "judgment": {"han": "小過。亨，利貞，可小事，不可大事。飛鳥遺之音，不宜上，宜下，大吉。", "en": "PREPONDERANCE OF THE SMALL. Success. Perseverance furthers. Small things may be done; great things should not be done. The flying bird brings the message: It is not well to strive upward, it is well to remain below. Great good fortune.", "ko": "소과는 형통하고 바름이 이로우니 작은 일은 할 수 있으나 큰 일은 할 수 없다. 나는 새가 소리를 남기니 위로 향하는 것은 마땅하지 않고 아래로 향하는 것이 마땅하니 크게 길하다."}, "lines": [{"han": "초육(初六)：飛鳥以凶。", "en": "The bird meets with misfortune through flying.", "ko": "나는 새가 흉함을 만난다."}, {"han": "육이(六二)：過其祖，遇其妣；不及其君，遇其臣，無咎。", "en": "She passes by her ancestor and meets her ancestress. He does not reach his prince and meets the official. No blame.", "ko": "할아버지를 지나 할머니를 만나고 군주에게 미치지 못하고 신하를 만나니 허물이 없다."}, {"han": "구삼(九三)：弗過防之，從或戕之，凶。", "en": "If one is not extremely careful, somebody may come up from behind and strike him. Misfortune.", "ko": "지나치게 경계하지 않으면 혹 뒤에서 해치는 자가 있으니 흉하다."}, {"han": "구사(九四)：無咎，弗過遇之，往厲必戒，勿用永貞。", "en": "No blame. He meets him without passing by. Going brings danger. One must be on guard. Do not act. Be constantly persevering.", "ko": "허물이 없으니 지나치지 않고 만난다. 나아가면 위태로우니 반드시 경계하고 영원히 바름을 씀은 이롭지 않다."}, {"han": "육오(六五)：密雲不雨，自我西郊，公弋取彼在穴。", "en": "Dense clouds, no rain from our western territory. The prince shoots and hits him who is in the cave.", "ko": "빽빽한 구름에 우리 서쪽 교외에서 비가 오지 않으니 공이 화살로 굴 속의 것을 잡는다."}, {"han": "상육(上六)：弗遇過之，飛鳥離之，凶，是謂災眚。", "en": "He passes him by, not meeting him. The flying bird leaves him. Misfortune. This means bad luck and injury.", "ko": "만나지 않고 지나치니 나는 새가 그를 떠나니 흉하다. 이를 재앙이라 한다."}]}, "4-8": {"number": 16, "name": {"han": "豫", "ko": "뇌지예", "en": "Enthusiasm"}, "judgment": {"han": "豫。利建侯行師。", "en": "ENTHUSIASM. It furthers one to install helpers and to set armies marching.", "ko": "예는 제후를 세우고 군대를 출동시킴이 이롭다."}, "lines": [{"han": "초육(初六)：鳴豫，凶。", "en": "Enthusiasm that expresses itself brings misfortune.", "ko": "즐거움을 드러내어 자랑하니 흉하다."}, {"han": "육이(六二)：介于石，不終日，貞吉。", "en": "Firm as a rock. Not a whole day. Perseverance brings good fortune.", "ko": "돌처럼 굳으니 하루도 채우지 않고 바름이 길하다."}, {"han": "육삼(六三)：盱豫悔；遲有悔。", "en": "Enthusiasm that looks upward creates remorse. Hesitation brings remorse.", "ko": "우러러보며 즐거워하면 후회가 있고 늦으면 후회가 있다."}, {"han": "구사(九四)：由豫，大有得；勿疑，朋盍簪。", "en": "The source of enthusiasm. He achieves great things. Doubt not. You gather friends around you as a hair clasp gathers the hair.", "ko": "즐거움의 원천이니 크게 얻음이 있다. 의심하지 않으면 벗들이 비녀처럼 모여든다."}, {"han": "육오(六五)：貞疾，恒不死。", "en": "Persistently ill, and still does not die.", "ko": "바름을 지키되 병드니 항상 죽지는 않는다."}, {"han": "상육(上六)：冥豫，成有渝，無咎。", "en": "Deluded enthusiasm. But if after completion one changes, there is no blame.", "ko": "어두운 즐거움이나 이루고 나서 바꾸면 허물이 없다."}]}, "5-1": {"number": 9, "name": {"han": "小畜", "ko": "풍천소축", "en": "The Taming Power of the Small"}, "judgment": {"han": "小畜。亨。密雲不雨，自我西郊。", "en": "THE TAMING POWER OF THE SMALL has success. Dense clouds, no rain from our western region.", "ko": "소축은 형통하니, 빽빽한 구름이 있으나 비가 오지 않음은 우리 서쪽 교외로부터이다."}, "lines": [{"han": "초구(初九)：復自道，何其咎，吉。", "en": "Return to the way. How could there be blame in this? Good fortune.", "ko": "도로 돌아오니 어찌 허물이 있으리오, 길하다."}, {"han": "구이(九二)：牽復，吉。", "en": "He allows himself to be drawn into returning. Good fortune.", "ko": "이끌려 돌아오니 길하다."}, {"han": "구삼(九三)：輿說輻，夫妻反目。", "en": "The spokes burst out of the wagon wheels. Man and wife roll their eyes.", "ko": "수레의 바퀴살이 빠지니 부부가 눈을 흘기도다."}, {"han": "육사(六四)：有孚，血去惕出，無咎。", "en": "If you are sincere, blood vanishes and fear gives way. No blame.", "ko": "믿음이 있으면 피가 사라지고 두려움이 없어지니 허물이 없다."}, {"han": "구오(九五)：有孚攣如，富以其鄰。", "en": "If you are sincere and loyally attached, you are rich in your neighbor.", "ko": "믿음이 있어 연결되니 이웃과 함께 부유하다."}, {"han": "상구(上九)：既雨既處，尚德載，婦貞厲。月幾望，君子征凶。", "en": "The rain comes, there is rest. This is due to the lasting effect of character. Perseverance brings the woman into danger. The moon is nearly full. If the superior man persists, misfortune comes.", "ko": "이미 비가 오고 이미 머무르니 덕이 쌓임을 숭상함이라. 부인은 바름을 지키면 위태롭고 달이 거의 차니 군자가 나아가면 흉하다."}]}, "5-2": {"number": 61, "name": {"han": "中孚", "ko": "풍택중부", "en": "Inner Truth"}, "judgment": {"han": "中孚。豚魚吉，利涉大川，利貞。", "en": "INNER TRUTH. Pigs and fishes. Good fortune. It furthers one to cross the great water. Perseverance furthers.", "ko": "중부는 돼지와 물고기에도 길하니 큰 강을 건넘이 이롭고 바름이 이롭다."}, "lines": [{"han": "초구(初九)：虞吉，有它不燕。", "en": "Being prepared brings good fortune. If there are secret designs, it is disquieting.", "ko": "헤아리면 길하나 다른 마음이 있으면 편안하지 않다."}, {"han": "구이(九二)：鳴鶴在陰，其子和之；我有好爵，吾與爾靡之。", "en": "A crane calling in the shade. Its young answers it. I have a good goblet. I will share it with you.", "ko": "학이 그늘에서 우니 그 새끼가 화답한다. 나에게 좋은 술잔이 있으니 그대와 함께 마시리라."}, {"han": "육삼(六三)：得敵，或鼓或罷，或泣或歌。", "en": "He finds a comrade. Now he beats the drum, now he stops. Now he sobs, now he sings.", "ko": "적을 만나니 혹 북을 치고 혹 그치며 혹 울고 혹 노래한다."}, {"han": "육사(六四)：月幾望，馬匹亡，無咎。", "en": "The moon nearly at the full. The team horse goes astray. No blame.", "ko": "달이 거의 차니 짝 말이 사라지나 허물이 없다."}, {"han": "구오(九五)：有孚攣如，無咎。", "en": "He possesses truth, which links together. No blame.", "ko": "믿음이 있어 연결되니 허물이 없다."}, {"han": "상구(上九)：翰音登于天，貞凶。", "en": "Cock-crow penetrating to heaven. Perseverance brings misfortune.", "ko": "닭 울음소리가 하늘로 오르니 바름이 흉하다."}]}, "5-3": {"number": 37, "name": {"han": "家人", "ko": "풍화가인", "en": "The Family"}, "judgment": {"han": "家人。利女貞。", "en": "THE FAMILY. The perseverance of the woman furthers.", "ko": "가인은 여자의 바름이 이롭다."}, "lines": [{"han": "초구(初九)：閑有家，悔亡。", "en": "Firm seclusion within the family. Remorse disappears.", "ko": "집안에 법도가 있으니 후회가 없어진다."}, {"han": "육이(六二)：無攸遂，在中饋，貞吉。", "en": "She should not follow her whims. She must attend within to the food. Perseverance brings good fortune.", "ko": "마음대로 함이 없어 안에서 음식을 장만하니 바름이 길하다."}, {"han": "구삼(九三)：家人嗃嗃，悔厲，吉；婦子嘻嘻，終吝。", "en": "When tempers flare up in the family, too great severity brings remorse. Good fortune nonetheless. When woman and child dally and laugh, it leads in the end to humiliation.", "ko": "가인이 엄하게 하니 후회하고 위태로우나 길하다. 부인과 아이가 웃고 떠들면 마침내 인색하다."}, {"han": "육사(六四)：富家，大吉。", "en": "She is the treasure of the house. Great good fortune.", "ko": "집안을 부유하게 하니 크게 길하다."}, {"han": "구오(九五)：王假有家，勿恤，吉。", "en": "As a king he approaches his family. Fear not. Good fortune.", "ko": "왕이 집안에 이르니 걱정하지 말라 길하다."}, {"han": "상구(上九)：有孚威如，終吉。", "en": "His work commands respect. In the end good fortune comes.", "ko": "믿음이 있고 위엄이 있으니 마침내 길하다."}]}, "5-4": {"number": 42, "name": {"han": "益", "ko": "풍뢰익", "en": "Increase"}, "judgment": {"han": "益。利有攸往，利涉大川。", "en": "INCREASE. It furthers one to undertake something. It furthers one to cross the great water.", "ko": "익은 나아갈 바가 있음이 이롭고 큰 강을 건넘이 이롭다."}, "lines": [{"han": "초구(初九)：利用為大作，元吉，無咎。", "en": "It furthers one to accomplish great deeds. Supreme good fortune. No blame.", "ko": "큰 일을 하는 데 씀이 이로우니 크게 길하고 허물이 없다."}, {"han": "육이(六二)：或益之十朋之龜，弗克違，永貞吉。王用享于帝，吉。", "en": "Someone does indeed increase him. Ten pairs of tortoises cannot oppose it. Constant perseverance brings good fortune. The king presents him before God. Good fortune.", "ko": "혹 열 쌍의 거북으로 더해주니 어기지 못하며 영원히 바름이 길하다. 왕이 상제 앞에 바치니 길하다."}, {"han": "육삼(六三)：益之用凶事，無咎，有孚中行，告公用圭。", "en": "One is enriched through unfortunate events. No blame, if you are sincere and walk in the middle, and report with a good seal to the prince.", "ko": "흉한 일에 더함을 씀이니 허물이 없고 믿음이 있어 중도를 걸으며 규로써 공에게 고한다."}, {"han": "육사(六四)：中行，告公從，利用為依遷國。", "en": "If you walk in the middle and report to the prince, he will follow. It furthers one to be used in the removal of the capital.", "ko": "중도를 걸어 공에게 고하면 따르니 나라를 옮기는 데 의지함이 이롭다."}, {"han": "구오(九五)：有孚惠心，勿問元吉。有孚惠我德。", "en": "If in truth you have a kind heart, ask not. Supreme good fortune. Truly, kindness will be recognized as your virtue.", "ko": "믿음이 있어 마음이 은혜로우니 묻지 않아도 크게 길하다. 믿음이 있으면 나의 덕을 은혜로이 여긴다."}, {"han": "상구(上九)：莫益之，或擊之，立心勿恒，凶。", "en": "No one increases him. Someone even strikes him. He does not keep his heart constantly steady. Misfortune.", "ko": "더해주는 이가 없고 혹 치는 이가 있으니 마음을 항상 바르게 세우지 않으면 흉하다."}]}, "5-5": {"number": 57, "name": {"han": "巽", "ko": "중풍손", "en": "The Gentle"}, "judgment": {"han": "巽。小亨，利有攸往，利見大人。", "en": "THE GENTLE. Success through what is small. It furthers one to have somewhere to go. It furthers one to see the great man.", "ko": "손은 작게 형통하니 나아갈 바가 있음이 이롭고 대인을 만나봄이 이롭다."}, "lines": [{"han": "초육(初六)：進退，利武人之貞。", "en": "In advancing and in retreating, the perseverance of a warrior furthers.", "ko": "나아가고 물러남에 무인의 바름이 이롭다."}, {"han": "구이(九二)：巽在床下，用史巫紛若，吉，無咎。", "en": "Penetration under the bed. Priests and magicians are used in great number. Good fortune. No blame.", "ko": "침상 아래 엎드리니 사관과 무당을 많이 쓰면 길하고 허물이 없다."}, {"han": "구삼(九三)：頻巽，吝。", "en": "Repeated penetration. Humiliation.", "ko": "자주 엎드리니 인색하다."}, {"han": "육사(六四)：悔亡，田獲三品。", "en": "Remorse vanishes. During the hunt three kinds of game are caught.", "ko": "후회가 없어지니 사냥에서 세 가지 짐승을 잡는다."}, {"han": "구오(九五)：貞吉，悔亡，無不利，無初有終，先庚三日，後庚三日，吉。", "en": "Perseverance brings good fortune. Remorse vanishes. Nothing that does not further. No beginning, but an end. Before the change, three days. After the change, three days. Good fortune.", "ko": "바름이 길하고 후회가 없어지며 이롭지 않음이 없다. 처음은 없으나 끝이 있으니 경일 전 삼일, 경일 후 삼일이 길하다."}, {"han": "상구(上九)：巽在床下，喪其資斧，貞凶。", "en": "Penetration under the bed. He loses his property and his ax. Perseverance brings misfortune.", "ko": "침상 아래 엎드려 재물과 도끼를 잃으니 바름이 흉하다."}]}, "5-6": {"number": 59, "name": {"han": "渙", "ko": "풍수환", "en": "Dispersion"}, "judgment": {"han": "渙。亨，王假有廟，利涉大川，利貞。", "en": "DISPERSION. Success. The king approaches his temple. It furthers one to cross the great water. Perseverance furthers.", "ko": "환은 형통하니 왕이 묘에 이른다. 큰 강을 건넘이 이롭고 바름이 이롭다."}, "lines": [{"han": "초육(初六)：用拯馬壯，吉。", "en": "He brings help with the strength of a horse. Good fortune.", "ko": "강한 말의 힘으로 구원하니 길하다."}, {"han": "구이(九二)：渙奔其機，悔亡。", "en": "At the dissolution he hurries to that which supports him. Remorse disappears.", "ko": "환난에 그 받침대로 달려가니 후회가 없어진다."}, {"han": "육삼(六三)：渙其躬，無悔。", "en": "He dissolves his self. No remorse.", "ko": "자신을 흩으니 후회가 없다."}, {"han": "육사(六四)：渙其群，元吉。渙有丘，匪夷所思。", "en": "He dissolves his bond with his group. Supreme good fortune. Dispersion leads in turn to accumulation. This is something that ordinary men do not think of.", "ko": "그 무리를 흩으니 크게 길하다. 흩어짐에 언덕이 있으니 보통 사람이 생각하지 못하는 것이다."}, {"han": "구오(九五)：渙汗其大號，渙王居，無咎。", "en": "His loud cries are as dissolving as sweat. Dissolution. A king abides without blame.", "ko": "크게 호령하여 땀처럼 흩어지니 왕이 거처하여도 허물이 없다."}, {"han": "상구(上九)：渙其血，去逖出，無咎。", "en": "He dissolves his blood. Departing, keeping at a distance, going out, is without blame.", "ko": "그 피를 흩으니 멀리 떠나가면 허물이 없다."}]}, "5-7": {"number": 53, "name": {"han": "漸", "ko": "풍산점", "en": "Development"}, "judgment": {"han": "漸。女歸吉，利貞。", "en": "DEVELOPMENT. The maiden is given in marriage. Good fortune. Perseverance furthers.", "ko": "점은 여자가 시집가니 길하고 바름이 이롭다."}, "lines": [{"han": "초육(初六)：鴻漸于干，小子厲，有言，無咎。", "en": "The wild goose gradually draws near the shore. The young son is in danger. There is talk. No blame.", "ko": "기러기가 점점 물가에 가까이 오니 어린 자식이 위태롭다. 말이 있으나 허물이 없다."}, {"han": "육이(六二)：鴻漸于磐，飲食衎衎，吉。", "en": "The wild goose gradually draws near the cliff. Eating and drinking in peace and concord. Good fortune.", "ko": "기러기가 점점 바위에 가까이 오니 먹고 마심이 즐겁고 화목하니 길하다."}, {"han": "구삼(九三)：鴻漸于陸，夫征不復，婦孕不育，凶。利禦寇。", "en": "The wild goose gradually draws near the plateau. The man goes forth and does not return. The woman carries a child but does not bring it forth. Misfortune. It furthers one to fight off robbers.", "ko": "기러기가 점점 육지에 가까이 오니 남자가 나가 돌아오지 않고 여자가 임신하나 낳지 못하니 흉하다. 도적을 막음이 이롭다."}, {"han": "육사(六四)：鴻漸于木，或得其桷，無咎。", "en": "The wild goose gradually draws near the tree. Perhaps it will find a flat branch. No blame.", "ko": "기러기가 점점 나무에 가까이 오니 혹 평평한 가지를 얻으니 허물이 없다."}, {"han": "구오(九五)：鴻漸于陵，婦三歲不孕，終莫之勝，吉。", "en": "The wild goose gradually draws near the summit. For three years the woman has no child. In the end nothing can hinder her. Good fortune.", "ko": "기러기가 점점 언덕에 가까이 오니 부인이 삼 년간 잉태하지 못하나 마침내 막을 수 없으니 길하다."}, {"han": "상구(上九)：鴻漸于陸，其羽可用為儀，吉。", "en": "The wild goose gradually draws near the cloud heights. Its feathers can be used for the sacred dance. Good fortune.", "ko": "기러기가 점점 높은 곳에 오르니 그 깃털을 의식에 쓸 수 있으니 길하다."}]}, "5-8": {"number": 20, "name": {"han": "觀", "ko": "풍지관", "en": "Contemplation"}, "judgment": {"han": "觀。盥而不薦，有孚顒若。", "en": "CONTEMPLATION. The ablution has been made, but not yet the offering. Full of trust they look up to him.", "ko": "관은 손을 씻었으나 아직 제물을 올리지 않았을 때니, 믿음이 있어 우러러봄이 있다."}, "lines": [{"han": "초육(初六)：童觀，小人無咎，君子吝。", "en": "Childlike contemplation. For an inferior man, no blame. For a superior man, humiliation.", "ko": "어린아이처럼 보니 소인은 허물이 없으나 군자는 인색하다."}, {"han": "육이(六二)：闚觀，利女貞。", "en": "Contemplation through the crack of the door. Furthering for the perseverance of a woman.", "ko": "문틈으로 엿보니 여자의 바름에 이롭다."}, {"han": "육삼(六三)：觀我生，進退。", "en": "Contemplation of my life decides the choice between advance and retreat.", "ko": "내 삶을 보아 나아가고 물러남을 결정한다."}, {"han": "육사(六四)：觀國之光，利用賓于王。", "en": "Contemplation of the light of the kingdom. It furthers one to exert influence as the guest of a king.", "ko": "나라의 빛을 보니 왕의 손님으로서 영향을 미침이 이롭다."}, {"han": "구오(九五)：觀我生，君子無咎。", "en": "Contemplation of my life. The superior man is without blame.", "ko": "내 삶을 보니 군자는 허물이 없다."}, {"han": "상구(上九)：觀其生，君子無咎。", "en": "Contemplation of his life. The superior man is without blame.", "ko": "그의 삶을 보니 군자는 허물이 없다."}]}, "6-1": {"number": 5, "name": {"han": "需", "ko": "수천수", "en": "Waiting"}, "judgment": {"han": "需。有孚，光亨，貞吉。利涉大川。", "en": "WAITING. If you are sincere, you have light and success. Perseverance brings good fortune. It furthers one to cross the great water.", "ko": "수는 믿음이 있으니 빛나고 형통하며 바름이 길하다. 큰 강을 건넘이 이롭다."}, "lines": [{"han": "초구(初九)：需于郊，利用恒，無咎。", "en": "Waiting in the meadow. It furthers one to abide in what endures. No blame.", "ko": "교외에서 기다리니 항상함을 씀이 이롭고 허물이 없다."}, {"han": "구이(九二)：需于沙，小有言，終吉。", "en": "Waiting on the sand. There is some gossip. The end brings good fortune.", "ko": "모래밭에서 기다리니 약간의 말이 있으나 마침내 길하다."}, {"han": "구삼(九三)：需于泥，致寇至。", "en": "Waiting in the mud brings about the arrival of the enemy.", "ko": "진흙에서 기다리니 도적이 이르게 한다."}, {"han": "육사(六四)：需于血，出自穴。", "en": "Waiting in blood. Get out of the pit.", "ko": "피 속에서 기다리니 굴에서 나오라."}, {"han": "구오(九五)：需于酒食，貞吉。", "en": "Waiting at meat and drink. Perseverance brings good fortune.", "ko": "술과 음식 곁에서 기다리니 바름이 길하다."}, {"han": "상육(上六)：入于穴，有不速之客三人來，敬之終吉。", "en": "One falls into the pit. Three uninvited guests arrive. Honor them, and in the end there will be good fortune.", "ko": "굴에 들어가니 청하지 않은 손님 세 사람이 오거든 공경하면 마침내 길하리라."}]}, "6-2": {"number": 60, "name": {"han": "節", "ko": "수택절", "en": "Limitation"}, "judgment": {"han": "節。亨，苦節不可貞。", "en": "LIMITATION. Success. Galling limitation must not be persevered in.", "ko": "절은 형통하나 괴로운 절제는 바름을 지속할 수 없다."}, "lines": [{"han": "초구(初九)：不出戶庭，無咎。", "en": "Not going out of the door and the courtyard is without blame.", "ko": "문과 뜰을 나가지 않으니 허물이 없다."}, {"han": "구이(九二)：不出門庭，凶。", "en": "Not going out of the gate and the courtyard brings misfortune.", "ko": "대문과 뜰을 나가지 않으니 흉하다."}, {"han": "육삼(六三)：不節若，則嗟若，無咎。", "en": "He who knows no limitation will have cause to lament. No blame.", "ko": "절제하지 않으면 탄식하게 되니 허물이 없다."}, {"han": "육사(六四)：安節，亨。", "en": "Contented limitation. Success.", "ko": "편안하게 절제하니 형통하다."}, {"han": "구오(九五)：甘節，吉，往有尚。", "en": "Sweet limitation brings good fortune. Going brings esteem.", "ko": "달콤하게 절제하니 길하고 나아가면 높임이 있다."}, {"han": "상육(上六)：苦節，貞凶，悔亡。", "en": "Galling limitation. Perseverance brings misfortune. Remorse disappears.", "ko": "괴로운 절제이니 바름이 흉하나 후회가 없어진다."}]}, "6-3": {"number": 63, "name": {"han": "既濟", "ko": "수화기제", "en": "After Completion"}, "judgment": {"han": "既濟。亨小，利貞，初吉終亂。", "en": "AFTER COMPLETION. Success in small matters. Perseverance furthers. At the beginning good fortune, at the end disorder.", "ko": "기제는 작게 형통하고 바름이 이로우니 처음은 길하나 끝에는 혼란하다."}, "lines": [{"han": "초구(初九)：曳其輪，濡其尾，無咎。", "en": "He brakes his wheels. He gets his tail in the water. No blame.", "ko": "수레바퀴를 끌고 꼬리를 물에 적시니 허물이 없다."}, {"han": "육이(六二)：婦喪其茀，勿逐，七日得。", "en": "The woman loses the curtain of her carriage. Do not run after it; on the seventh day you will get it.", "ko": "부인이 수레 가리개를 잃으니 쫓지 말라. 칠 일이면 얻는다."}, {"han": "구삼(九三)：高宗伐鬼方，三年克之，小人勿用。", "en": "The Illustrious Ancestor disciplines the Devil's Country. After three years he conquers it. Inferior men must not be employed.", "ko": "고종이 귀방을 정벌하여 삼 년 만에 이기니 소인은 쓰지 말라."}, {"han": "육사(六四)：繻有衣袽，終日戒。", "en": "The finest clothes turn to rags. Be careful all day long.", "ko": "비단옷이 해어지니 종일 경계하라."}, {"han": "구오(九五)：東鄰殺牛，不如西鄰之禴祭，實受其福。", "en": "The neighbor in the east who slaughters an ox does not attain as much real happiness as the neighbor in the west with his small offering.", "ko": "동쪽 이웃이 소를 잡는 것이 서쪽 이웃의 약소한 제사만 못하니 실제로 그 복을 받는다."}, {"han": "상육(上六)：濡其首，厲。", "en": "He gets his head in the water. Danger.", "ko": "머리를 물에 적시니 위태롭다."}]}, "6-4": {"number": 3, "name": {"han": "屯", "ko": "수뢰준", "en": "Difficulty at the Beginning"}, "judgment": {"han": "屯。元亨利貞，勿用有攸往，利建侯。", "en": "DIFFICULTY AT THE BEGINNING works supreme success, furthering through perseverance. Nothing should be undertaken. It furthers one to appoint helpers.", "ko": "준은 크게 형통하고 바름이 이로우니, 나아갈 바를 두지 말고 제후를 세움이 이롭다."}, "lines": [{"han": "초구(初九)：磐桓，利居貞，利建侯。", "en": "Hesitation and hindrance. It furthers one to remain persevering. It furthers one to appoint helpers.", "ko": "서성거림이니, 바름에 머무름이 이롭고 제후를 세움이 이롭다."}, {"han": "육이(六二)：屯如邅如，乘馬班如。匪寇婚媾，女子貞不字，十年乃字。", "en": "Difficulties pile up. Horse and wagon part. He is not a robber; he wants to woo when the time comes. The maiden is chaste; she does not pledge herself. Ten years — then she pledges herself.", "ko": "어렵고 머뭇거리며 말과 수레가 맴도니, 도적이 아니라 혼인하려는 것이나 여자는 바르게 지키고 허락하지 않다가 십 년이 지나야 허락하리라."}, {"han": "육삼(六三)：即鹿無虞，惟入于林中，君子幾不如舍，往吝。", "en": "Whoever hunts deer without the forester only loses his way in the forest. The superior man understands the signs of the time and prefers to desist. To go on brings humiliation.", "ko": "사슴을 쫓되 우인 없이 숲속으로 들어가니, 군자는 기미를 보아 그만두느니만 못하며 나아가면 인색하리라."}, {"han": "육사(六四)：乘馬班如，求婚媾，往吉，無不利。", "en": "Horse and wagon part. Strive for union. To go brings good fortune. Everything acts to further."
