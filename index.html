, "ko": "말과 수레가 맴도니 혼인을 구하면 나아가 길하고 이롭지 않음이 없다."}, {"han": "구오(九五)：屯其膏，小貞吉，大貞凶。", "en": "Difficulties in blessing. A little perseverance brings good fortune. Great perseverance brings misfortune.", "ko": "그 은택을 베풀기 어려우니 작은 바름은 길하고 큰 바름은 흉하다."}, {"han": "상육(上六)：乘馬班如，泣血漣如。", "en": "Horse and wagon part. Bloody tears flow.", "ko": "말과 수레가 맴도니 피눈물이 흘러내리도다."}]}, "6-5": {"number": 48, "name": {"han": "井", "ko": "수풍정", "en": "The Well"}, "judgment": {"han": "井。改邑不改井，無喪無得，往來井井。汔至，亦未繘井，羸其瓶，凶。", "en": "THE WELL. The town may be changed, but the well cannot be changed. It neither decreases nor increases. They come and go and draw from the well. If one gets down almost to the water and the rope does not go all the way, or the jug breaks, it brings misfortune.", "ko": "정은 고을을 바꾸어도 우물은 바꿀 수 없다. 줄어들지도 않고 늘어나지도 않으니 오고 가며 우물에서 긷는다. 거의 다 왔을 때 두레박 줄이 우물에 닿지 않거나 두레박이 깨지면 흉하다."}, "lines": [{"han": "초육(初六)：井泥不食，舊井無禽。", "en": "One does not drink the mud of the well. No animals come to an old well.", "ko": "우물의 진흙은 먹지 않으니 오래된 우물에 짐승도 오지 않는다."}, {"han": "구이(九二)：井谷射鮒，甕敝漏。", "en": "At the well hole one shoots fishes. The jug is broken and leaks.", "ko": "우물 골짜기에서 붕어를 쏘니 독이 낡아 새는구나."}, {"han": "구삼(九三)：井渫不食，為我心惻，可用汲，王明，並受其福。", "en": "The well is cleaned, but no one drinks from it. This is my heart's sorrow, for one might draw from it. If the king were clear-minded, good fortune might be enjoyed in common.", "ko": "우물을 청소했으나 먹지 않으니 내 마음이 슬프다. 길을 수 있으니 왕이 밝으면 함께 복을 받을 수 있다."}, {"han": "육사(六四)：井甃，無咎。", "en": "The well is being lined. No blame.", "ko": "우물에 벽돌을 쌓으니 허물이 없다."}, {"han": "구오(九五)：井洌，寒泉食。", "en": "In the well there is a clear, cold spring from which one can drink.", "ko": "우물이 맑으니 차가운 샘물을 마신다."}, {"han": "상육(上六)：井收勿幕，有孚，元吉。", "en": "One draws from the well without hindrance. It is dependable. Supreme good fortune.", "ko": "우물을 덮지 않고 긷되 믿음이 있으니 크게 길하다."}]}, "6-6": {"number": 29, "name": {"han": "坎", "ko": "중수감", "en": "The Abysmal"}, "judgment": {"han": "習坎。有孚，維心亨，行有尚。", "en": "THE ABYSMAL repeated. If you are sincere, you have success in your heart, and whatever you do succeeds.", "ko": "습감은 믿음이 있으면 마음이 형통하고 행하면 높임이 있다."}, "lines": [{"han": "초육(初六)：習坎，入于坎窞，凶。", "en": "Repetition of the Abysmal. In the abyss one falls into a pit. Misfortune.", "ko": "습감이니 구덩이 속 더 깊은 웅덩이에 빠지니 흉하다."}, {"han": "구이(九二)：坎有險，求小得。", "en": "The abyss is dangerous. One should strive to attain small things only.", "ko": "감에 위험이 있으니 작은 것을 구하여 얻는다."}, {"han": "육삼(六三)：來之坎坎，險且枕，入于坎窞，勿用。", "en": "Forward and backward, abyss on abyss. In danger like this, pause and wait, otherwise you will fall into the pit of the abyss. Do not act in this way.", "ko": "오고 가도 함정이니 위험하고 또 기대니 구덩이 속에 빠지면 쓸 수 없다."}, {"han": "육사(六四)：樽酒簋貳，用缶，納約自牖，終無咎。", "en": "A jug of wine, a bowl of rice with it; earthen vessels simply handed in through the window. There is certainly no blame in this.", "ko": "술 한 동이와 밥 두 그릇을 질그릇으로 창문으로 들이니 마침내 허물이 없다."}, {"han": "구오(九五)：坎不盈，祗既平，無咎。", "en": "The abyss is not filled to overflowing, it is filled only to the rim. No blame.", "ko": "감이 가득 차지 않고 다만 평평하게 차니 허물이 없다."}, {"han": "상육(上六)：係用徽纆，寘于叢棘，三歲不得，凶。", "en": "Bound with cords and ropes, shut in between thorn-hedged prison walls: for three years one does not find the way. Misfortune.", "ko": "노끈으로 묶어 가시덤불 속에 두니 삼 년이 되도록 얻지 못하니 흉하다."}]}, "6-7": {"number": 39, "name": {"han": "蹇", "ko": "수산건", "en": "Obstruction"}, "judgment": {"han": "蹇。利西南，不利東北，利見大人，貞吉。", "en": "OBSTRUCTION. The southwest furthers. The northeast does not further. It furthers one to see the great man. Perseverance brings good fortune.", "ko": "건은 서남방이 이롭고 동북방이 이롭지 않으며 대인을 만나봄이 이롭고 바름이 길하다."}, "lines": [{"han": "초육(初六)：往蹇，來譽。", "en": "Going leads to obstructions, coming meets with praise.", "ko": "나아가면 어렵고 돌아오면 칭예가 있다."}, {"han": "육이(六二)：王臣蹇蹇，匪躬之故。", "en": "The king's servant is beset by obstruction upon obstruction, but it is not his own fault.", "ko": "왕의 신하가 어려움에 어려움을 당하나 자신의 허물이 아니다."}, {"han": "구삼(九三)：往蹇，來反。", "en": "Going leads to obstructions; hence he comes back.", "ko": "나아가면 어렵고 돌아오면 돌아온다."}, {"han": "육사(六四)：往蹇，來連。", "en": "Going leads to obstructions, coming leads to union.", "ko": "나아가면 어렵고 돌아오면 연결된다."}, {"han": "구오(九五)：大蹇，朋來。", "en": "In the midst of the greatest obstructions, friends come.", "ko": "큰 어려움에 처해도 벗들이 온다."}, {"han": "상육(上六)：往蹇，來碩，吉，利見大人。", "en": "Going leads to obstructions, coming leads to great good fortune. It furthers one to see the great man.", "ko": "나아가면 어렵고 돌아오면 크게 길하니 대인을 만나봄이 이롭다."}]}, "6-8": {"number": 8, "name": {"han": "比", "ko": "수지비", "en": "Holding Together"}, "judgment": {"han": "比。吉。原筮，元永貞，無咎。不寧方來，後夫凶。", "en": "HOLDING TOGETHER brings good fortune. Inquire of the oracle once again whether you possess sublimity, constancy, and perseverance; then there is no blame. Those who are uncertain gradually join. Those who come too late meet with misfortune.", "ko": "비는 길하니 근본을 점쳐서 크고 영원히 바름이면 허물이 없다. 편안하지 않은 자들이 사방에서 오며 늦게 오는 자는 흉하다."}, "lines": [{"han": "초육(初六)：有孚比之，無咎。有孚盈缶，終來有它，吉。", "en": "Hold to him in truth and loyalty; this is without blame. Truth, like a full earthen bowl: thus in the end good fortune comes from without.", "ko": "믿음으로 친하게 지내니 허물이 없다. 믿음이 질그릇에 가득하니 마침내 다른 길함이 오리라."}, {"han": "육이(六二)：比之自內，貞吉。", "en": "Hold to him inwardly. Perseverance brings good fortune.", "ko": "안으로부터 친하게 지내니 바름이 길하다."}, {"han": "육삼(六三)：比之匪人。", "en": "You hold together with the wrong people.", "ko": "친하게 지낼 사람이 아닌 자와 친하게 지내도다."}, {"han": "육사(六四)：外比之，貞吉。", "en": "Hold to him outwardly also. Perseverance brings good fortune.", "ko": "밖으로 친하게 지내니 바름이 길하다."}, {"han": "구오(九五)：顯比，王用三驅，失前禽，邑人不誡，吉。", "en": "Manifestation of holding together. In the hunt the king uses beaters on three sides only and foregos game that runs off in front. The citizens need no warning. Good fortune.", "ko": "친함을 드러냄이니 왕이 삼면으로 몰아 앞의 짐승을 잃어도 고을 사람들이 경계하지 않아도 길하다."}, {"han": "상육(上六)：比之無首，凶。", "en": "He finds no head for holding together. Misfortune.", "ko": "친함에 머리가 없으니 흉하다."}]}, "7-1": {"number": 26, "name": {"han": "大畜", "ko": "산천대축", "en": "The Taming Power of the Great"}, "judgment": {"han": "大畜。利貞，不家食吉，利涉大川。", "en": "THE TAMING POWER OF THE GREAT. Perseverance furthers. Not eating at home brings good fortune. It furthers one to cross the great water.", "ko": "대축은 바름이 이로우니 집에서 먹지 않음이 길하고 큰 강을 건넘이 이롭다."}, "lines": [{"han": "초구(初九)：有厲，利已。", "en": "Danger is at hand. It furthers one to desist.", "ko": "위태로움이 있으니 그치는 것이 이롭다."}, {"han": "구이(九二)：輿說輹。", "en": "The axletrees are taken from the wagon.", "ko": "수레에서 바퀴축이 빠진다."}, {"han": "구삼(九三)：良馬逐，利艱貞，曰閑輿衛，利有攸往。", "en": "A good horse that follows others. Awareness of danger, with perseverance, furthers. Practice chariot driving and armed defense daily. It furthers one to have somewhere to go.", "ko": "좋은 말이 달리니 어려움을 알고 바름을 지킴이 이롭다. 날마다 수레 모는 것과 방어하는 것을 익히면 나아갈 바가 있음이 이롭다."}, {"han": "육사(六四)：童牛之牿，元吉。", "en": "The headboard of a young bull. Supreme good fortune.", "ko": "어린 소의 뿔막이니 크게 길하다."}, {"han": "육오(六五)：豶豕之牙，吉。", "en": "The tusk of a gelded boar. Good fortune.", "ko": "거세된 돼지의 어금니니 길하다."}, {"han": "상구(上九)：何天之衢，亨。", "en": "One attains the way of heaven. Success.", "ko": "하늘의 큰 길을 달리니 형통하다."}]}, "7-2": {"number": 41, "name": {"han": "損", "ko": "산택손", "en": "Decrease"}, "judgment": {"han": "損。有孚，元吉，無咎，可貞，利有攸往。曷之用，二簋可用享。", "en": "DECREASE combined with sincerity brings about supreme good fortune without blame. One may be persevering in this. It furthers one to undertake something. How is this to be carried out? One may use two small bowls for the sacrifice.", "ko": "손은 믿음이 있으면 크게 길하고 허물이 없으며 바름을 지킬 수 있고 나아갈 바가 있음이 이롭다. 무엇에 쓸 것인가? 두 개의 대그릇으로도 제사를 드릴 수 있다."}, "lines": [{"han": "초구(初九)：已事遄往，無咎，酌損之。", "en": "When the task is finished, hurrying brings no blame. But one must reflect on how much one may decrease others.", "ko": "일이 끝나면 빨리 가니 허물이 없으나 얼마나 덜어낼지 헤아려야 한다."}, {"han": "구이(九二)：利貞，征凶，弗損益之。", "en": "Perseverance furthers. To undertake something brings misfortune. Without decreasing oneself, one is able to bring increase to others.", "ko": "바름이 이롭고 나아가면 흉하니 자신을 손상시키지 않고 남을 이롭게 한다."}, {"han": "육삼(六三)：三人行，則損一人；一人行，則得其友。", "en": "When three people journey together, their number decreases by one. When one man journeys alone, he finds a companion.", "ko": "세 사람이 가면 한 사람이 줄고, 한 사람이 가면 벗을 얻는다."}, {"han": "육사(六四)：損其疾，使遄有喜，無咎。", "en": "If a man decreases his faults, it makes the other hasten to come and rejoice. No blame.", "ko": "그 허물을 덜어내면 빨리 기쁨이 오게 하니 허물이 없다."}, {"han": "육오(六五)：或益之十朋之龜，弗克違，元吉。", "en": "Someone does indeed increase him. Ten pairs of tortoises cannot oppose it. Supreme good fortune.", "ko": "혹 열 쌍의 거북으로 더해주니 어기지 못하니 크게 길하다."}, {"han": "상구(上九)：弗損益之，無咎，貞吉，利有攸往，得臣無家。", "en": "If one increases without taking from others, there is no blame. Perseverance brings good fortune. It furthers one to undertake something. One obtains servants but no longer has a separate home.", "ko": "손상시키지 않고 더해주니 허물이 없고 바름이 길하며 나아갈 바가 있음이 이롭고 신하를 얻으나 집이 없다."}]}, "7-3": {"number": 22, "name": {"han": "賁", "ko": "산화비", "en": "Grace"}, "judgment": {"han": "賁。亨，小利有攸往。", "en": "GRACE has success. In small matters it is favorable to undertake something.", "ko": "비는 형통하니 작은 일에 나아갈 바가 있음이 이롭다."}, "lines": [{"han": "초구(初九)：賁其趾，舍車而徒。", "en": "He lends grace to his toes, leaves the carriage, and walks.", "ko": "발을 꾸미고 수레를 버리고 걸어간다."}, {"han": "육이(六二)：賁其須。", "en": "Lends grace to the beard on his chin.", "ko": "수염을 꾸민다."}, {"han": "구삼(九三)：賁如，濡如，永貞吉。", "en": "Graceful and moist. Constant perseverance brings good fortune.", "ko": "꾸미고 윤택하니 영원히 바름을 지키면 길하다."}, {"han": "육사(六四)：賁如，皤如，白馬翰如，匪寇婚媾。", "en": "Grace or simplicity? A white horse comes as if on wings. He is not a robber; he will woo at the right time.", "ko": "꾸미는 듯하다가 소박하게 하니 흰 말이 날듯이 오도다. 도적이 아니라 혼인하려는 것이다."}, {"han": "육오(六五)：賁于丘園，束帛戔戔，吝，終吉。", "en": "Grace in hills and gardens. The roll of silk is meager and small. Humiliation, but in the end good fortune.", "ko": "언덕과 동산을 꾸미니 비단 묶음이 적고 작으나 인색하나 마침내 길하다."}, {"han": "상구(上九)：白賁，無咎。", "en": "Simple grace. No blame.", "ko": "소박한 꾸밈이니 허물이 없다."}]}, "7-4": {"number": 27, "name": {"han": "頤", "ko": "산뢰이", "en": "The Corners of the Mouth"}, "judgment": {"han": "頤。貞吉，觀頤，自求口實。", "en": "THE CORNERS OF THE MOUTH. Perseverance brings good fortune. Pay heed to the providing of nourishment and to what a man seeks to fill his own mouth with.", "ko": "이는 바름이 길하니 이를 보아 스스로 입에 채울 것을 구한다."}, "lines": [{"han": "초구(初九)：舍爾靈龜，觀我朵頤，凶。", "en": "You let your magic tortoise go, and look at me with the corners of your mouth drooping. Misfortune.", "ko": "너의 신령한 거북을 버리고 나를 보며 턱을 늘어뜨리니 흉하다."}, {"han": "육이(六二)：顛頤，拂經，于丘頤，征凶。", "en": "Turning to the summit for nourishment, deviating from the path to seek nourishment from the hill. Continuing to do this brings misfortune.", "ko": "뒤집어 기르니 정도를 어기고 언덕에서 기름을 구하니 나아가면 흉하다."}, {"han": "육삼(六三)：拂頤，貞凶，十年勿用，無攸利。", "en": "Turning away from nourishment. Perseverance brings misfortune. Do not act thus for ten years. Nothing furthers.", "ko": "기름을 어기니 바름이 흉하고 십 년간 쓰지 못하며 이로울 바가 없다."}, {"han": "육사(六四)：顛頤，吉，虎視眈眈，其欲逐逐，無咎。", "en": "Turning to the summit for provision of nourishment brings good fortune. Spying about with sharp eyes like a tiger with insatiable craving. No blame.", "ko": "뒤집어 기름이 길하니 호랑이처럼 날카롭게 눈을 부릅뜨고 그 욕심이 계속되나 허물이 없다."}, {"han": "육오(六五)：拂經，居貞吉，不可涉大川。", "en": "Turning away from the path. To remain persevering brings good fortune. One should not cross the great water.", "ko": "정도를 어기나 바름에 거하면 길하고 큰 강을 건너서는 안 된다."}, {"han": "상구(上九)：由頤，厲吉，利涉大川。", "en": "The source of nourishment. Awareness of danger brings good fortune. It furthers one to cross the great water.", "ko": "기름의 근원이니 위태로움을 알면 길하고 큰 강을 건넘이 이롭다."}]}, "7-5": {"number": 18, "name": {"han": "蠱", "ko": "산풍고", "en": "Work on What Has Been Spoiled"}, "judgment": {"han": "蠱。元亨，利涉大川。先甲三日，後甲三日。", "en": "WORK ON WHAT HAS BEEN SPOILED has supreme success. It furthers one to cross the great water. Before the starting point, three days. After the starting point, three days.", "ko": "고는 크게 형통하니 큰 강을 건넘이 이롭다. 갑일 전 삼일, 갑일 후 삼일."}, "lines": [{"han": "초육(初六)：幹父之蠱，有子考，無咎，厲終吉。", "en": "Setting right what has been spoiled by the father. If there is a son, no blame rests upon the departed father. Danger. In the end good fortune.", "ko": "아버지의 허물을 바로잡으니 자식이 있으면 아버지에게 허물이 없다. 위태로우나 마침내 길하다."}, {"han": "구이(九二)：幹母之蠱，不可貞。", "en": "Setting right what has been spoiled by the mother. One must not be too persevering.", "ko": "어머니의 허물을 바로잡되 너무 강하게 바름을 지키면 안 된다."}, {"han": "구삼(九三)：幹父之蠱，小有悔，無大咎。", "en": "Setting right what has been spoiled by the father. There will be a little remorse. No great blame.", "ko": "아버지의 허물을 바로잡으니 약간의 후회가 있으나 큰 허물은 없다."}, {"han": "육사(六四)：裕父之蠱，往見吝。", "en": "Tolerating what has been spoiled by the father. In continuing one sees humiliation.", "ko": "아버지의 허물을 너그럽게 봐주니 나아가면 인색함을 본다."}, {"han": "육오(六五)：幹父之蠱，用譽。", "en": "Setting right what has been spoiled by the father. One meets with praise.", "ko": "아버지의 허물을 바로잡으니 칭예를 받는다."}, {"han": "상구(上九)：不事王侯，高尚其事。", "en": "He does not serve kings and princes, sets himself higher goals.", "ko": "왕후를 섬기지 않고 그 일을 높이 숭상한다."}]}, "7-6": {"number": 4, "name": {"han": "蒙", "ko": "산수몽", "en": "Youthful Folly"}, "judgment": {"han": "蒙。亨。匪我求童蒙，童蒙求我。初筮告，再三瀆，瀆則不告。利貞。", "en": "YOUTHFUL FOLLY has success. It is not I who seek the young fool; the young fool seeks me. At the first oracle I inform him. If he asks two or three times, it is importunity. If he importunes, I give him no information. Perseverance furthers.", "ko": "몽은 형통하니, 내가 어린 몽매한 자를 구하는 것이 아니라 어린 몽매한 자가 나를 구하는 것이다. 처음 점치면 알려주나 두세 번 하면 모독이니 모독하면 알려주지 않는다. 바름이 이롭다."}, "lines": [{"han": "초육(初六)：發蒙，利用刑人，用說桎梏，以往吝。", "en": "To make a fool develop, it furthers one to apply discipline. The fetters should be removed. To go on in this way brings humiliation.", "ko": "몽매함을 열어주되 형벌을 씀이 이로우니, 차꼬를 벗겨주고 나아가면 인색하리라."}, {"han": "구이(九二)：包蒙吉，納婦吉，子克家。", "en": "To bear with fools in kindliness brings good fortune. To know how to take women brings good fortune. The son is capable of taking charge of the household.", "ko": "몽매함을 포용함이 길하고 부인을 맞이함이 길하니, 자식이 집안을 이어받을 수 있도다."}, {"han": "육삼(六三)：勿用取女；見金夫，不有躬，無攸利。", "en": "Take not a maiden who, when she sees a man of bronze, loses possession of herself. Nothing furthers.", "ko": "여자를 취하지 말라. 금을 가진 남자를 보고 몸을 지키지 못하니 이로울 바가 없다."}, {"han": "육사(六四)：困蒙，吝。", "en": "Entangled folly brings humiliation.", "ko": "몽매함에 곤궁하니 인색하리라."}, {"han": "육오(六五)：童蒙，吉。", "en": "Childlike folly brings good fortune.", "ko": "어린 몽매함이니 길하다."}, {"han": "상구(上九)：擊蒙；不利為寇，利禦寇。", "en": "In punishing folly it does not further one to commit transgressions. The only thing that furthers is to prevent transgressions.", "ko": "몽매함을 침이니, 도적이 됨은 이롭지 않고 도적을 막음이 이롭다."}]}, "7-7": {"number": 52, "name": {"han": "艮", "ko": "중산간", "en": "Keeping Still"}, "judgment": {"han": "艮其背，不獲其身，行其庭，不見其人，無咎。", "en": "KEEPING STILL. Keeping his back still so that he no longer feels his body. He goes into his courtyard and does not see his people. No blame.", "ko": "등을 고요히 하여 몸을 느끼지 않고 뜰을 걸어도 사람을 보지 않으니 허물이 없다."}, "lines": [{"han": "초육(初六)：艮其趾，無咎，利永貞。", "en": "Keeping his toes still. No blame. Continued perseverance furthers.", "ko": "발가락을 고요히 하니 허물이 없고 영원히 바름이 이롭다."}, {"han": "육이(六二)：艮其腓，不拯其隨，其心不快。", "en": "Keeping his calves still. He cannot rescue him whom he follows. His heart is not glad.", "ko": "장딴지를 고요히 하니 따르는 자를 구하지 못하여 마음이 기쁘지 않다."}, {"han": "구삼(九三)：艮其限，列其夤，厲薰心。", "en": "Keeping his hips still. Making his sacrum stiff. Dangerous. The heart suffocates.", "ko": "허리를 고요히 하니 등 살이 갈라지고 위태로움이 마음을 태운다."}, {"han": "육사(六四)：艮其身，無咎。", "en": "Keeping his trunk still. No blame.", "ko": "몸통을 고요히 하니 허물이 없다."}, {"han": "육오(六五)：艮其輔，言有序，悔亡。", "en": "Keeping his jaws still. The words are well-ordered. Remorse disappears.", "ko": "뺨을 고요히 하니 말에 차서가 있어 후회가 없어진다."}, {"han": "상구(上九)：敦艮，吉。", "en": "Noblehearted keeping still. Good fortune.", "ko": "돈독하게 고요히 하니 길하다."}]}, "7-8": {"number": 23, "name": {"han": "剝", "ko": "산지박", "en": "Splitting Apart"}, "judgment": {"han": "剝。不利有攸往。", "en": "SPLITTING APART. It does not further one to go anywhere.", "ko": "박은 나아갈 바가 있음이 이롭지 않다."}, "lines": [{"han": "초육(初六)：剝床以足，蔑貞凶。", "en": "The leg of the bed is split. Those who persevere are destroyed. Misfortune.", "ko": "침상의 다리를 깎으니 바름을 없애면 흉하다."}, {"han": "육이(六二)：剝床以辨，蔑貞凶。", "en": "The bed is split at the edge. Those who persevere are destroyed. Misfortune.", "ko": "침상의 모서리를 깎으니 바름을 없애면 흉하다."}, {"han": "육삼(六三)：剝之，無咎。", "en": "He splits with them. No blame.", "ko": "깎아내어 허물이 없다."}, {"han": "육사(六四)：剝床以膚，凶。", "en": "The bed is split up to the skin. Misfortune.", "ko": "침상을 피부까지 깎으니 흉하다."}, {"han": "육오(六五)：貫魚，以宮人寵，無不利。", "en": "A shoal of fishes. Favor comes through the court ladies. Everything acts to further.", "ko": "물고기가 꿰어지듯 궁인들의 총애를 받으니 이롭지 않음이 없다."}, {"han": "상구(上九)：碩果不食，君子得輿，小人剝廬。", "en": "There is a large fruit still uneaten. The superior man receives a carriage. The house of the inferior man is split apart.", "ko": "큰 열매를 먹지 않으니 군자는 수레를 얻고 소인은 오두막이 무너진다."}]}, "8-1": {"number": 11, "name": {"han": "泰", "ko": "지천태", "en": "Peace"}, "judgment": {"han": "泰。小往大來，吉，亨。", "en": "PEACE. The small departs, the great approaches. Good fortune. Success.", "ko": "태는 작은 것이 가고 큰 것이 오니 길하고 형통하다."}, "lines": [{"han": "초구(初九)：拔茅茹，以其彙，征吉。", "en": "When ribbon grass is pulled up, the sod comes with it. Each according to his kind. Undertakings bring good fortune.", "ko": "띠풀을 뽑으면 그 무리가 함께 나오니 나아가면 길하다."}, {"han": "구이(九二)：包荒，用馮河，不遐遺，朋亡，得尚于中行。", "en": "Bearing with the uncultured in gentleness, fording the river with resolution, not neglecting what is distant, not regarding one's companions: thus one may manage to walk in the middle.", "ko": "거친 것을 포용하고 맨몸으로 강을 건너며 먼 것을 버리지 않고 붕당을 없애면 중도를 걸어 높임을 얻는다."}, {"han": "구삼(九三)：無平不陂，無往不復，艱貞無咎，勿恤其孚，于食有福。", "en": "No plain not followed by a slope. No going not followed by a return. He who remains persevering in danger is without blame. Do not complain about this truth; enjoy the good fortune you still possess.", "ko": "평탄하기만 하고 기울지 않는 것이 없고 가기만 하고 돌아오지 않는 것이 없으니, 어렵더라도 바름을 지키면 허물이 없다. 그 믿음을 근심하지 말고 먹는 데서 복이 있으리라."}, {"han": "육사(六四)：翩翩不富，以其鄰，不戒以孚。", "en": "He flutters down, not boasting of his wealth, together with his neighbor, guileless and sincere.", "ko": "나풀나풀 날아 부유함을 자랑하지 않고 그 이웃과 함께 경계하지 않고 믿음으로 대하도다."}, {"han": "육오(六五)：帝乙歸妹，以祉，元吉。", "en": "The sovereign I gives his daughter in marriage. This brings blessing and supreme good fortune.", "ko": "제을이 딸을 시집보내니 복이 있고 크게 길하다."}, {"han": "상육(上六)：城復于隍，勿用師，自邑告命，貞吝。", "en": "The wall falls back into the moat. Use no army now. Make your commands known within your own town. Perseverance brings humiliation.", "ko": "성이 해자로 무너지니 군대를 쓰지 말고 고을 안에서 명을 내릴지라도 바름이 인색하리라."}]}, "8-2": {"number": 19, "name": {"han": "臨", "ko": "지택임", "en": "Approach"}, "judgment": {"han": "臨。元亨利貞，至于八月有凶。", "en": "APPROACH has supreme success. Perseverance furthers. When the eighth month comes, there will be misfortune.", "ko": "임은 크게 형통하고 바름이 이로우나 팔월이 되면 흉함이 있다."}, "lines": [{"han": "초구(初九)：咸臨，貞吉。", "en": "Joint approach. Perseverance brings good fortune.", "ko": "함께 임하니 바름이 길하다."}, {"han": "구이(九二)：咸臨，吉，無不利。", "en": "Joint approach. Good fortune. Everything furthers.", "ko": "함께 임하니 길하고 이롭지 않음이 없다."}, {"han": "육삼(六三)：甘臨，無攸利；既憂之，無咎。", "en": "Comfortable approach. Nothing that would further. If one is induced to grieve over it, one becomes free of blame.", "ko": "감언으로 임하니 이로울 바가 없다. 이를 근심하면 허물이 없다."}, {"han": "육사(六四)：至臨，無咎。", "en": "Complete approach. No blame.", "ko": "지극히 임하니 허물이 없다."}, {"han": "육오(六五)：知臨，大君之宜，吉。", "en": "Wise approach. This is right for a great prince. Good fortune.", "ko": "지혜롭게 임하니 대군의 마땅함이라 길하다."}, {"han": "상육(上六)：敦臨，吉，無咎。", "en": "Great-hearted approach. Good fortune. No blame.", "ko": "돈독하게 임하니 길하고 허물이 없다."}]}, "8-3": {"number": 36, "name": {"han": "明夷", "ko": "지화명이", "en": "Darkening of the Light"}, "judgment": {"han": "明夷。利艱貞。", "en": "DARKENING OF THE LIGHT. In adversity it furthers one to be persevering.", "ko": "명이는 어려움에 바름이 이롭다."}, "lines": [{"han": "초구(初九)：明夷于飛，垂其翼。君子于行，三日不食。有攸往，主人有言。", "en": "Darkening of the light during flight. He lowers his wings. The superior man does not eat for three days on his wanderings. But he has somewhere to go. The host has occasion to gossip about him.", "ko": "날 때 밝음이 상하니 날개를 드리운다. 군자가 행할 때 사흘을 먹지 않으나 나아갈 바가 있으니 주인이 말하는 바가 있다."}, {"han": "육이(六二)：明夷，夷于左股，用拯馬壯，吉。", "en": "Darkening of the light injures him in the left thigh. He gives aid with the strength of a horse. Good fortune.", "ko": "명이에 왼쪽 넓적다리를 다치니 강한 말의 힘으로 구하면 길하다."}, {"han": "구삼(九三)：明夷于南狩，得其大首；不可疾貞。", "en": "Darkening of the light during the hunt in the south. Their great leader is captured. One must not expect perseverance too soon.", "ko": "남쪽으로 사냥하여 그 큰 우두머리를 얻으니 빨리 바름을 구해서는 안 된다."}, {"han": "육사(六四)：入于左腹，獲明夷之心，于出門庭。", "en": "He penetrates the left side of the belly. One gets at the very heart of the darkening of the light. We leave the gate and courtyard.", "ko": "왼쪽 배로 들어가 명이의 마음을 얻어 문과 뜰을 나온다."}, {"han": "육오(六五)：箕子之明夷，利貞。", "en": "Darkening of the light as with Prince Chi. Perseverance furthers.", "ko": "기자의 명이이니 바름이 이롭다."}, {"han": "상육(上六)：不明，晦；初登于天，後入于地。", "en": "Not light, but darkness. First he climbed up to heaven, then he plunged into the depths of the earth.", "ko": "밝지 않고 어두우니 처음에는 하늘에 올랐다가 나중에는 땅으로 들어간다."}]}, "8-4": {"number": 24, "name": {"han": "復", "ko": "지뢰복", "en": "Return"}, "judgment": {"han": "復。亨，出入無疾，朋來無咎。反復其道，七日來復，利有攸往。", "en": "RETURN. Success. Going out and coming in without error. Friends come without blame. To and fro goes the way. On the seventh day comes return. It furthers one to have somewhere to go.", "ko": "복은 형통하니 드나들어 탈이 없고 벗이 와도 허물이 없다. 그 도를 돌이키고 돌이켜 칠일 만에 돌아오니 나아갈 바가 있음이 이롭다."}, "lines": [{"han": "초구(初九)：不遠復，無祇悔，元吉。", "en": "Return from a short distance. No need for remorse. Great good fortune.", "ko": "멀지 않아 돌아오니 뉘우침에 이르지 않아 크게 길하다."}, {"han": "육이(六二)：休復，吉。", "en": "Quiet return. Good fortune.", "ko": "편안히 돌아오니 길하다."}, {"han": "육삼(六三)：頻復，厲無咎。", "en": "Repeated return. Danger. No blame.", "ko": "자주 돌아오니 위태로우나 허물은 없다."}, {"han": "육사(六四)：中行獨復。", "en": "Walking in the midst of others, one returns alone.", "ko": "무리 중에 걸어가다가 홀로 돌아온다."}, {"han": "육오(六五)：敦復，無悔。", "en": "Noblehearted return. No remorse.", "ko": "돈독하게 돌아오니 후회가 없다."}, {"han": "상육(上六)：迷復，凶，有災眚。用行師，終有大敗，以其國君凶；至于十年不克征。", "en": "Missing the return. Misfortune. Misfortune from within and without. If armies are set marching in this way, one will in the end suffer a great defeat, disastrous for the ruler of the country. For ten years it will not be possible to attack again.", "ko": "돌아오는 길을 잃으니 흉하고 재앙이 있다. 군대를 출동시키면 마침내 크게 패하니 그 나라의 군주가 흉하고 십 년이 지나도록 정벌하지 못한다."}]}, "8-5": {"number": 46, "name": {"han": "升", "ko": "지풍승", "en": "Pushing Upward"}, "judgment": {"han": "升。元亨，用見大人，勿恤，南征吉。", "en": "PUSHING UPWARD has supreme success. One must see the great man. Fear not. Departure toward the south brings good fortune.", "ko": "승은 크게 형통하니 대인을 만나봄이 이롭고 걱정하지 말라. 남쪽으로 나아가면 길하다."}, "lines": [{"han": "초육(初六)：允升，大吉。", "en": "Pushing upward that meets with confidence brings great good fortune.", "ko": "믿음 있는 자가 오르니 크게 길하다."}, {"han": "구이(九二)：孚乃利用禴，無咎。", "en": "If one is sincere, it furthers one to bring even a small offering. No blame.", "ko": "믿음이 있으면 약소한 제사를 드림이 이롭고 허물이 없다."}, {"han": "구삼(九三)：升虛邑。", "en": "One pushes upward into an empty city.", "ko": "빈 성읍으로 오른다."}, {"han": "육사(六四)：王用亨于岐山，吉，無咎。", "en": "The king offers him Mount Chi. Good fortune. No blame.", "ko": "왕이 기산에서 제사를 드리니 길하고 허물이 없다."}, {"han": "육오(六五)：貞吉，升階。", "en": "Perseverance brings good fortune. One pushes upward by steps.", "ko": "바름이 길하니 계단을 올라간다."}, {"han": "상육(上六)：冥升，利于不息之貞。", "en": "Pushing upward in darkness. It furthers one to be unremittingly persevering.", "ko": "어두운 데서 오르니 쉬지 않는 바름이 이롭다."}]}, "8-6": {"number": 7, "name": {"han": "師", "ko": "지수사", "en": "The Army"}, "judgment": {"han": "師。貞，丈人吉，無咎。", "en": "THE ARMY. The army needs perseverance and a strong man. Good fortune without blame.", "ko": "사는 바름이니 어른다운 사람이라야 길하고 허물이 없다."}, "lines": [{"han": "초육(初六)：師出以律，否臧凶。", "en": "An army must set forth in proper order. If the order is not good, misfortune threatens.", "ko": "군대가 출정할 때 규율이 있어야 하니 그렇지 않으면 흉하다."}, {"han": "구이(九二)：在師中，吉，無咎，王三錫命。", "en": "In the midst of the army. Good fortune. No blame. The king bestows a triple decoration.", "ko": "군대 중에 있으니 길하고 허물이 없으며 왕이 세 번 명을 내려 표창한다."}, {"han": "육삼(六三)：師或輿尸，凶。", "en": "Perchance the army carries corpses in the wagon. Misfortune.", "ko": "군대가 혹 수레에 시체를 싣게 되니 흉하다."}, {"han": "육사(六四)：師左次，無咎。", "en": "The army retreats to the left. No blame.", "ko": "군대가 왼쪽에 머무르니 허물이 없다."}, {"han": "육오(六五)：田有禽，利執言，無咎。長子帥師，弟子輿尸，貞凶。", "en": "There is game in the field. It furthers one to catch it. Without blame. Let the eldest son lead the army, the younger son carries corpses; then perseverance brings misfortune.", "ko": "밭에 짐승이 있으니 말을 집행함이 이롭고 허물이 없다. 장자가 군대를 이끌고 제자는 시체를 수레에 싣게 되니 바름이 흉하다."}, {"han": "상육(上六)：大君有命，開國承家，小人勿用。", "en": "The great prince issues commands, founds states, vests families with fiefs. Inferior men should not be employed.", "ko": "대군이 명을 내리니 나라를 열고 집안을 잇되 소인은 쓰지 말라."}]}, "8-7": {"number": 15, "name": {"han": "謙", "ko": "지산겸", "en": "Modesty"}, "judgment": {"han": "謙。亨，君子有終。", "en": "MODESTY creates success. The superior man carries things through.", "ko": "겸은 형통하니 군자는 끝마침이 있다."}, "lines": [{"han": "초육(初六)：謙謙君子，用涉大川，吉。", "en": "A superior man modest about his modesty may cross the great water. Good fortune.", "ko": "겸손하고 겸손한 군자이니 큰 강을 건넘이 길하다."}, {"han": "육이(六二)：鳴謙，貞吉。", "en": "Modesty that comes to expression. Perseverance brings good fortune.", "ko": "겸손함이 울리니 바름이 길하다."}, {"han": "구삼(九三)：勞謙，君子有終，吉。", "en": "A superior man of merit who brings his work to completion and in so doing is modest. Good fortune.", "ko": "수고로우면서도 겸손하니 군자는 끝마침이 있어 길하다."}, {"han": "육사(六四)：無不利，撝謙。", "en": "Nothing that would not further modesty in movement.", "ko": "이롭지 않음이 없으니 겸손함을 발휘한다."}, {"han": "육오(六五)：不富以其鄰，利用侵伐，無不利。", "en": "No boasting of wealth before one's neighbor. It is favorable to attack with force. Nothing that would not further.", "ko": "부유함으로 이웃에 자랑하지 않으니 침벌을 씀이 이롭고 이롭지 않음이 없다."}, {"han": "상육(上六)：鳴謙，利用行師，征邑國。", "en": "Modesty that comes to expression. It is favorable to set armies marching to chastise one's own city and one's country.", "ko": "겸손함이 울리니 군대를 출동시켜 읍과 나라를 정벌함이 이롭다."}]}, "8-8": {"number": 2, "name": {"han": "坤", "ko": "중지곤", "en": "The Receptive"}, "judgment": {"han": "坤。元亨，利牝馬之貞。君子有攸往，先迷後得主，利。西南得朋，東北喪朋。安貞吉。", "en": "THE RECEPTIVE brings about sublime success, furthering through the perseverance of a mare. If the superior man undertakes something and tries to lead, he goes astray; but if he follows, he finds guidance. It is favorable to find friends in the west and south, to forego friends in the east and north. Quiet perseverance brings good fortune.", "ko": "곤은 크게 형통하니, 암말의 바름이 이롭다. 군자가 나아갈 바가 있을 때 먼저 가면 미혹되고 뒤에 가면 주인을 얻으니 이롭다. 서남방에서 벗을 얻고 동북방에서 벗을 잃으니, 편안히 바름을 지킴이 길하다."}, "lines": [{"han": "초육(初六)：履霜，堅冰至。", "en": "When there is hoarfrost underfoot, solid ice is not far off.", "ko": "서리를 밟으면 굳은 얼음이 이르리라."}, {"han": "육이(六二)：直方大，不習無不利。", "en": "Straight, square, great. Without purpose, yet nothing remains unfurthered.", "ko": "곧고 반듯하고 크니, 익히지 않아도 이롭지 않음이 없다."}, {"han": "육삼(六三)：含章可貞，或從王事，無成有終。", "en": "Hidden lines. One is able to remain persevering. If by chance you are in the service of a king, seek not works, but bring to completion.", "ko": "문채를 머금고 바름을 지킬 수 있으니, 혹 왕의 일에 종사하면 이룸은 없으나 마침이 있으리라."}, {"han": "육사(六四)：括囊，無咎無譽。", "en": "A tied-up sack. No blame, no praise.", "ko": "주머니를 묶으니 허물도 없고 칭예도 없다."}, {"han": "육오(六五)：黃裳，元吉。", "en": "A yellow lower garment brings supreme good fortune.", "ko": "황색 치마니 크게 길하다."}, {"han": "상육(上六)：龍戰于野，其血玄黃。", "en": "Dragons fight in the meadow. Their blood is black and yellow.", "ko": "용이 들에서 싸우니 그 피가 검고 누르다."}]}};</script>
<script>

const TR = [
  {id:1,n:"건",h:"乾",e:"Heaven",  l:[1,1,1]},

const LOOKUP = {"1-1":1,"1-2":10,"1-3":13,"1-4":25,"1-5":44,"1-6":6,"1-7":33,"1-8":12,"2-1":43,"2-2":58,"2-3":49,"2-4":17,"2-5":28,"2-6":47,"2-7":31,"2-8":45,"3-1":14,"3-2":38,"3-3":30,"3-4":21,"3-5":50,"3-6":64,"3-7":56,"3-8":35,"4-1":34,"4-2":54,"4-3":55,"4-4":51,"4-5":32,"4-6":40,"4-7":62,"4-8":16,"5-1":9,"5-2":61,"5-3":37,"5-4":42,"5-5":57,"5-6":59,"5-7":53,"5-8":20,"6-1":5,"6-2":60,"6-3":63,"6-4":3,"6-5":48,"6-6":29,"6-7":39,"6-8":8,"7-1":26,"7-2":41,"7-3":22,"7-4":27,"7-5":18,"7-6":4,"7-7":52,"7-8":23,"8-1":11,"8-2":19,"8-3":36,"8-4":24,"8-5":46,"8-6":7,"8-7":15,"8-8":2};

const H2T = {};
for (const [k,n] of Object.entries(LOOKUP)) {
  const [u,l] = k.split('-').map(Number);
  H2T[n] = {u,l};
}

const NUMS = ["初","二","三","四","五","上"];

const T = {
  ko:{ul:"상괘 · UPPER",us:"위에 놓일 괘를 선택",ll:"하괘 · LOWER",ls:"아래에 놓일 괘를 선택",sw:"↑↓ 위아래 바꾸기",rs:"초기화",jl:"괘사 · THE JUDGMENT",el:"효 · LINES",eh:"— 효를 클릭하면 효사를 봅니다",se:"검색",sp:"괘명, 괘사, 효사 검색…",nr:"검색 결과 없음",st:"상괘와 하괘를 선택하세요",ss:"Select an upper and lower trigram to reveal the hexagram.",pu:"상",pd:"하",ln:i=>NUMS[i]+"효",le:i=>"효사 · "+NUMS[i]+"효",lc:i=>(i+1)+"효",jt:"괘사",cl:"닫기",bk:"← 효 목록으로"},
  en:{ul:"UPPER TRIGRAM",us:"Select the upper trigram",ll:"LOWER TRIGRAM",ls:"Select the lower trigram",sw:"↑↓ Swap",rs:"Reset",jl:"THE JUDGMENT",el:"LINES",eh:"— Click a line to read its text",se:"Search",sp:"Search hexagrams, judgments, lines…",nr:"No results found",st:"Select upper and lower trigrams",ss:"Choose a trigram pair to reveal the hexagram.",pu:"U",pd:"L",ln:i=>"Line "+(i+1),le:i=>"LINE "+(i+1),lc:i=>"Line "+(i+1),jt:"Judgment",cl:"Close",bk:"← Back to lines"},
  zh:{ul:"上卦",us:"請選擇上卦",ll:"下卦",ls:"請選擇下卦",sw:"↑↓ 互換",rs:"重置",jl:"卦辭",el:"爻辭",eh:"— 點擊爻位查看爻辭",se:"搜索",sp:"搜索卦名、卦辭、爻辭…",nr:"無搜索結果",st:"請選擇上卦與下卦",ss:"選擇上下卦以顯示卦象。",pu:"上",pd:"下",ln:i=>NUMS[i]+"爻",le:i=>NUMS[i]+"爻",lc:i=>(i+1)+"爻",jt:"卦辭",cl:"關閉",bk:"← 返回爻列表"},
};

let S = {uid:1, lid:1, lang:"ko", line:-1, search:false, q:""};

function x(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function tg(lines, sz, gap, th) {
  const vis = [...lines].reverse();
  const half = Math.floor(sz * 0.43);
  return '<div class="tg" style="gap:'+gap+'px">' +
    vis.map(v => {
      if (v) {
        return '<div class="tr" style="width:'+sz+'px;height:'+th+'px;background:#3a3028;border-radius:1px"></div>';
      } else {
        return '<div class="tr" style="width:'+sz+'px;height:'+th+'px;display:flex;justify-content:space-between">'
          +'<div style="width:'+half+'px;height:100%;background:#3a3028;border-radius:1px"></div>'
          +'<div style="width:'+half+'px;height:100%;background:#3a3028;border-radius:1px"></div>'
          +'</div>';
      }
    }).join('') + '</div>';
}

function hg(up, lo, sz, th, gap, act) {
  const stack = [...lo, ...up];
  const vis = stack.map((v,i)=>({v,i})).reverse();
  const half = Math.floor(sz * 0.43);
  return '<div class="hg" style="gap:'+gap+'px">' +
    vis.map(({v,i}) => {
      const actCls = i===act ? ' act' : '';
      if (v) {
        return '<div class="hr'+actCls+'" style="width:'+sz+'px;height:'+th+'px;background:#3a3028;border-radius:1px"></div>';
      } else {
        return '<div class="hr'+actCls+'" style="width:'+sz+'px;height:'+th+'px;display:flex;justify-content:space-between">'
          +'<div style="width:'+half+'px;height:100%;background:#3a3028;border-radius:1px"></div>'
          +'<div style="width:'+half+'px;height:100%;background:#3a3028;border-radius:1px"></div>'
          +'</div>';
      }
    }).join('') + '</div>';
}

function passage(obj) {
  return '<div class="passage">'
    +'<div class="phan">'+x(obj.han)+'</div>'
    +'<div class="pen2">'+x(obj.en)+'</div>'
    +'<div class="pko">'+x(obj.ko)+'</div>'
    +'</div>';
}

function picker(which) {
  const t = T[S.lang];
  const lbl = which==='u' ? t.ul : t.ll;
  const sub = which==='u' ? t.us : t.ls;
  const cur = which==='u' ? S.uid : S.lid;
  const fn  = which==='u' ? 'su' : 'sl';
  return '<div class="picker">'
    +'<div class="pey">'+x(lbl)+'</div>'
    +'<div class="psub">'+x(sub)+'</div>'
    +'<div class="pgrid">'
    + TR.map(t=>'<button class="tcard'+(cur===t.id?' on':'')+'" onclick="'+fn+'('+t.id+')">'
        + tg(t.l, gsz().c, gsz().cg, gsz().ct)
        + '<div class="than">'+t.h+'</div>'
        + '<div class="tname">'+t.n+'</div>'
        + '<div class="ten">'+t.e+'</div>'
        +'</button>').join('')
    +'</div></div>';
}

function linesSection(hex, t) {
  if (S.line >= 0 && hex.lines[S.line]) {
    const l = hex.lines[S.line];
    return '<div class="lrail">'
      +'<div class="lhead2">'
      +'<button class="backbtn" onclick="bl()">'+x(t.bk)+'</button>'
      +'<span class="ley">'+x(t.le(S.line))+'</span>'
      +'</div>'
      + passage(l)
      +'</div>';
  }
  const items = hex.lines.map((l,i)=>({l,i})).reverse();
  return '<div class="lrail">'
    +'<div class="lhead"><span class="ley">'+x(t.el)+' <span class="lhint">'+x(t.eh)+'</span></span></div>'
    +'<div class="llist">'
    + items.map(({l,i})=>{
        const yang = /[九]/.test((l.han||'').split('：')[0]);
        const prev = (l.han||'').split('：')[1] || l.han;
        return '<button class="li" onclick="sl2('+i+')">'
          +'<span class="lnum">'+NUMS[i]+'</span>'
          +'<span class="lstroke"><span class="stk '+(yang?'s':'b')+'"></span></span>'
          +'<span class="llbl">'+t.lc(i)+'</span>'
          +'<span class="lprev">'+x(prev)+'</span>'
          +'</button>';
      }).join('')
    +'</div></div>';
}

function detail() {
  const t = T[S.lang];
  if (!S.uid || !S.lid) return '<div class="detail empty"><div class="empt-in"><div class="empt-sym">☰<br>☷</div><div class="empt-t">'+x(t.st)+'</div><div class="empt-s">'+x(t.ss)+'</div></div></div>';
  const key = S.uid+'-'+S.lid;
  const hex = D[key];
  const up = TR.find(r=>r.id===S.uid);
  const lo = TR.find(r=>r.id===S.lid);
  if (!hex || !up || !lo) return '<div class="detail empty"><div class="empt-in">'+hg(up?up.l:[0,0,0],lo?lo.l:[0,0,0],70,5,6,-1)+'</div></div>';
  const act = S.line===-1 ? -1 : (5-S.line);
  return '<div class="detail">'
    +'<div class="dhead">'
      +'<div>'
        +'<div class="dnum">No. '+String(hex.number).padStart(2,'0')+'</div>'
        +'<div class="dhan">'+x(hex.name.han)+'</div>'
        +'<div class="dnames"><span class="dko">'+x(hex.name.ko)+'</span><span class="dot"> · </span><span class="den">'+x(hex.name.en)+'</span></div>'
      +'</div>'
      +'<div class="dright">'
        + hg(up.l, lo.l, gsz().hx, gsz().ht, gsz().hg2, act)
        +'<div class="tpair">'
          +'<div><span class="plbl">'+x(t.pu)+'</span>'+x(up.h)+'<span class="pen"> '+x(up.e)+'</span></div>'
          +'<div><span class="plbl">'+x(t.pd)+'</span>'+x(lo.h)+'<span class="pen"> '+x(lo.e)+'</span></div>'
        +'</div>'
      +'</div>'
    +'</div>'
    +'<div class="dbody">'
      +'<section><div class="seyebrow">'+x(t.jl)+'</div>'+passage(hex.judgment)+'</section>'
      +'<section>'+linesSection(hex,t)+'</section>'
    +'</div>'
    +'</div>';
}

function searchResults() {
  const q = S.q.trim().toLowerCase();
  const t = T[S.lang];
  if (!q) return '';
  const found = [];
  const seen = {};
  for (const hex of Object.values(D)) {
    if (seen[hex.number]) continue;
    seen[hex.number] = true;
    const ns = (hex.name.han+' '+hex.name.ko+' '+hex.name.en).toLowerCase();
    if (ns.includes(q)) { found.push({hex,type:'name',snip:''}); continue; }
    const js2 = (hex.judgment.han+' '+hex.judgment.en+' '+hex.judgment.ko).toLowerCase();
    if (js2.includes(q)) { found.push({hex,type:'j',snip:hex.judgment.ko}); continue; }
    for (let i=0;i<hex.lines.length;i++) {
      const l=hex.lines[i];
      if ((l.han+' '+l.en+' '+l.ko).toLowerCase().includes(q)) found.push({hex,type:'l',li:i,snip:l.ko});
    }
  }
  found.sort((a,b)=>a.hex.number-b.hex.number);
  const res = found.slice(0,40);
  if (!res.length) return '<div class="sempty">'+x(t.nr)+'</div>';
  return res.map((r,i)=>{
    const tag = r.type==='name' ? '' : r.type==='j' ? '<span class="stag">'+x(t.jt)+'</span>' : '<span class="stag">'+x(t.ln(r.li))+'</span>';
    const snip = r.snip ? '<div class="ssnip">'+x(r.snip.slice(0,72)+(r.snip.length>72?'…':''))+'</div>' : '';
    return '<button class="sitem" onclick="nav('+r.hex.number+')">'
      +'<div class="smeta"><span class="snum">No.'+String(r.hex.number).padStart(2,'0')+'</span>'
      +'<span class="shan2">'+x(r.hex.name.han)+'</span>'
      +'<span class="sko">'+x(r.hex.name.ko)+'</span>'+tag+'</div>'+snip+'</button>';
  }).join('');
}

function searchPanel() {
  const t = T[S.lang];
  return '<div class="sov" onclick="if(event.target===this)cs()">'
    +'<div class="spanel">'
      +'<div class="shead">'
        +'<div class="sinwrap"><span class="sico">⊕</span>'
          +'<input id="si" class="sin" type="text" placeholder="'+x(t.sp)+'" value="'+x(S.q)+'" oninput="qi(this.value)">'
          +(S.q?'<button class="sclr" onclick="qi(\'\')">✕</button>':'')
        +'</div>'
        +'<button class="sclsbtn" onclick="cs()">'+x(t.cl)+'</button>'
      +'</div>'
      +'<div id="sr" class="sres">'+searchResults()+'</div>'
    +'</div></div>';
}

function app() {
  const t = T[S.lang];
  return '<div class="hdr">'
      +'<div class="brand">'
        +'<div class="bmark">'+tg([1,1,1],16,2,2)+tg([0,0,0],16,2,2)+'</div>'
        +'<div><div class="btitle">周易辭典</div><div class="bsub">주역 사전</div></div>'
      +'</div>'
      +'<div class="nav">'
        +'<button class="nbtn" onclick="os()">'+x(t.se)+'</button>'
        +'<div class="lsw">'
          +['ko','en','zh'].map(l=>'<button class="lbtn'+(S.lang===l?' on':'')+'" onclick="sl3(\''+l+'\')">'+{ko:'한',en:'EN',zh:'漢'}[l]+'</button>').join('')
        +'</div>'
      +'</div>'
    +'</div>'
    +'<div class="body">'
      +'<div class="sidebar">'
        + picker('u')
        +'<div class="divider"><button class="tbtn" onclick="sw()">'+x(t.sw)+'</button><button class="tbtn" onclick="rs()">'+x(t.rs)+'</button></div>'
        + picker('l')
      +'</div>'
      +'<div class="main" id="mp">'+detail()+'</div>'
    +'</div>'
    +'<div class="ftr"><span>Wilhelm / Baynes · 한글 번역 · 周易 原文</span><span class="m">A reading is a mirror, not a map.</span></div>'
    +(S.search ? searchPanel() : '');
}


function gsz() {
  var w = window.innerWidth, h = window.innerHeight;
  if (w < 768) return {c:32, ct:3, cg:3, hx:60, ht:5, hg2:6};

  // ── 카드 너비 기반 최대 글리프 크기 ──
  // CSS breakpoint에 따른 사이드바 너비 추정
  var sideW = w >= 1200 ? 360 : 300;
  // picker padding (clamp 12-22px; dvh 기준 중간값)
  var padH = Math.min(22, Math.max(12, Math.round(h * 0.018)));
  // grid gap (clamp 5-10px)
  var gapPx = Math.min(10, Math.max(5, Math.round(h * 0.008)));
  // card 가로 내부 여백 (좌우 합산 약 10px)
  var colW = (sideW - padH * 2 - 3 * gapPx) / 4;
  var maxFromW = Math.floor(colW - 12);   // 카드 내부 패딩 빼기

  // ── 카드 높이 기반 최대 글리프 크기 ──
  // (전체 높이 - 헤더 - 푸터 - body패딩 - 구분선) / 2 - 피커 헤더
  var perPicker = (h - 195) / 2 - 58;
  var perRow    = Math.max(36, (perPicker - gapPx) / 2);
  var maxFromH  = Math.min(64, Math.max(28, Math.round(perRow * 0.44)));

  // 너비·높이 중 작은 값 사용 (overflow 방지)
  var c  = Math.min(maxFromW, maxFromH);
  var ct = Math.max(3, Math.round(c * 0.1));
  var cg = Math.max(3, Math.round(c * 0.11));

  // ── 육효 글리프 (detail 헤더 우측) ──
  var hx  = Math.min(100, Math.max(54, Math.round(h * 0.09)));
  var ht  = Math.max(5, Math.round(hx * 0.075));
  var hg2 = Math.max(5, Math.round(hx * 0.09));
  return {c:c, ct:ct, cg:cg, hx:hx, ht:ht, hg2:hg2};
}

function paint() {
  const ms = document.getElementById('mp') ? document.getElementById('mp').scrollTop : 0;
  document.getElementById('root').innerHTML = app();
  const mp = document.getElementById('mp');
  if (mp) mp.scrollTop = ms;
  if (S.search) {
    const inp = document.getElementById('si');
    if (inp) setTimeout(()=>inp.focus(), 30);
  }
}

// Global handlers
function su(id){ S.uid=id; S.line=-1; paint();
window.addEventListener("resize", function(){ paint(); }); }
function sl(id){ S.lid=id; S.line=-1; paint(); }
function sw(){ const u=S.uid,l=S.lid; S.uid=l; S.lid=u; S.line=-1; paint(); }
function rs(){ S.uid=null; S.lid=null; S.line=-1; paint(); }
function sl3(l){ S.lang=l; paint(); }
function sl2(i){ S.line=i; paint(); }
function bl(){ S.line=-1; paint(); }
function os(){ S.search=true; S.q=''; paint(); }
function cs(){ S.search=false; paint(); }
function qi(v){
  S.q=v;
  const sr=document.getElementById('sr');
  if(sr) sr.innerHTML=searchResults();
}
function nav(num){
  const t=H2T[num];
  if(t){ S.uid=t.u; S.lid=t.l; S.line=-1; S.search=false; paint(); }
}

paint();

</script>
